<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>JINHAE Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F7F5;--surface:#fff;--surface2:#F2F2F0;
  --border:#E8E8E5;--border2:#D4D4D0;
  --text:#1A1A18;--text2:#5A5A55;--text3:#9A9A95;
  --accent:#2D6BE4;--accent-bg:#EEF4FF;--accent-txt:#1D4ED8;
  --red:#DC2626;--red-bg:#FEF2F2;
  --green:#16A34A;--green-bg:#F0FDF4;--green-txt:#15803D;
  --pink:#EC4899;--pink-bg:#FDF2F8;
  --radius:12px;--radius-sm:8px;--radius-xs:5px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --sb:220px;--tb:52px;
  --font:'Noto Sans KR',sans-serif;--font-ui:'DM Sans','Noto Sans KR',sans-serif;
}
[data-theme=dark]{
  --bg:#141412;--surface:#1E1E1C;--surface2:#262624;
  --border:#2E2E2C;--border2:#3A3A38;
  --text:#F0F0EC;--text2:#A8A8A4;--text3:#606060;
  --accent:#4D8BF4;--accent-bg:#1A2640;--accent-txt:#93B8FA;
  --red:#EF4444;--red-bg:#2D1515;
  --green:#22C55E;--green-bg:#142014;--green-txt:#4ADE80;
  --pink:#F472B6;--pink-bg:#2D1525;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --shadow-lg:0 8px 32px rgba(0,0,0,.4);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;}

/* Login */
#login-screen{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:20px;}
.login-logo{font-family:var(--font-ui);font-size:28px;font-weight:600;letter-spacing:-.5px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:13px;color:var(--text3);}
.login-btn{display:flex;align-items:center;gap:10px;padding:12px 24px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:14px;font-family:var(--font);color:var(--text);box-shadow:var(--shadow);transition:box-shadow .15s;}
.login-btn:hover{box-shadow:var(--shadow-lg);}
.login-loading{font-size:12px;color:var(--text3);}

/* App shell */
#app{display:none;height:100vh;flex-direction:column;}

/* Topbar */
.topbar{height:var(--tb);display:flex;align-items:center;padding:0 14px;gap:8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
.ham-btn{display:none;align-items:center;justify-content:center;background:none;border:1px solid var(--border2);border-radius:var(--radius-xs);padding:6px 8px;cursor:pointer;font-size:15px;color:var(--text2);}
.tb-nav{padding:5px 10px;background:none;border:1px solid var(--border2);border-radius:var(--radius-xs);cursor:pointer;font-size:12px;font-family:var(--font-ui);color:var(--text2);}
.tb-nav:hover{background:var(--surface2);}
.tb-title{flex:1;font-size:13px;font-weight:500;font-family:var(--font-ui);text-align:center;}
.tb-btn{padding:6px 12px;background:none;border:1px solid var(--border2);border-radius:var(--radius-xs);cursor:pointer;font-size:12px;font-family:var(--font);color:var(--text2);}
.tb-btn:hover{background:var(--surface2);}
#sync-status{display:none;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* Body */
.body{flex:1;display:flex;overflow:hidden;}

/* Sidebar */
.sidebar{width:var(--sb);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;position:fixed;top:0;left:0;height:100vh;z-index:150;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199;}
.sb-header{padding:14px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-logo{font-family:var(--font-ui);font-size:15px;font-weight:600;letter-spacing:-.3px;}
.sb-logo span{color:var(--accent);}
.sb-user{display:flex;align-items:center;gap:7px;margin-top:9px;}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.sb-name{font-size:11px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-logout{background:none;border:1px solid var(--border2);border-radius:var(--radius-xs);padding:2px 7px;cursor:pointer;font-size:10px;font-family:var(--font-ui);color:var(--text3);}
.sb-logout:hover{color:var(--red);border-color:var(--red);}
.nav-sec{padding:7px 10px 3px;}
.nav-lbl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:0 6px;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between;}
.nav-lbl-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;line-height:1;padding:0 2px;border-radius:3px;}
.nav-lbl-btn:hover{color:var(--accent);background:var(--accent-bg);}
.nav-btn{width:100%;display:flex;align-items:center;gap:7px;padding:5px 8px;background:none;border:none;border-radius:var(--radius-xs);cursor:pointer;font-size:12px;font-family:var(--font);color:var(--text2);text-align:left;transition:background .1s;}
.nav-btn:hover{background:var(--surface2);}
.nav-btn.active{background:var(--accent-bg);color:var(--accent-txt);font-weight:500;}
.nav-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0;}
.nav-div{height:1px;background:var(--border);margin:3px 10px;}
.proj-btn{width:100%;display:flex;align-items:center;gap:7px;padding:4px 8px;background:none;border:none;border-radius:var(--radius-xs);cursor:pointer;font-size:12px;font-family:var(--font);color:var(--text2);text-align:left;transition:background .1s;}
.proj-btn:hover{background:var(--surface2);}
.proj-btn.active{background:var(--accent-bg);color:var(--accent-txt);}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.proj-cnt{margin-left:auto;font-size:10px;color:var(--text3);background:var(--surface2);padding:1px 5px;border-radius:8px;}

/* Main */
.main{flex:1;overflow-y:auto;overflow-x:hidden;margin-left:var(--sb);}
.content{padding:14px;max-width:1200px;margin:0 auto;}
.filter-bar{display:none;padding:5px 14px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;gap:8px;font-size:12px;}
.filter-chip{padding:2px 10px;border-radius:12px;color:#fff;font-size:11px;font-weight:500;}
#backup-status{padding:3px 14px;font-size:11px;color:var(--text3);min-height:18px;}

/* Card */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}

/* Month calendar */
.month-view{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.month-hdr{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);}
.month-dow{padding:7px 4px;text-align:center;font-size:11px;font-weight:600;font-family:var(--font-ui);color:var(--text3);}
.month-dow.sat{color:var(--accent);}
.month-dow.sun{color:var(--red);}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.month-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px 5px;cursor:pointer;transition:background .1s;background:var(--surface);}
.month-cell:hover{background:var(--accent-bg);}
.month-cell.other{opacity:.35;cursor:default;background:var(--surface2);}
.month-cell.other:hover{background:var(--surface2);}
.month-cell.today{background:rgba(45,107,228,.04);}
.month-cell.selected{outline:2px solid var(--accent);outline-offset:-2px;}
.month-cell-num{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:2px;display:flex;align-items:baseline;flex-wrap:wrap;gap:1px;line-height:1.4;}
.month-ev{font-size:10px;padding:1px 5px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.cell-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-left:2px;vertical-align:middle;}

/* Year */
.year-view{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.year-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.year-dow{font-size:8px;color:var(--text3);text-align:center;padding:2px 0;font-family:var(--font-ui);}
.year-day{font-size:9px;text-align:center;padding:2px 1px;border-radius:3px;cursor:pointer;color:var(--text2);}
.year-day:hover{background:var(--accent-bg);color:var(--accent);}
.year-day.today{background:var(--accent);color:#fff;border-radius:50%;}
.year-day.has-ev{font-weight:600;color:var(--text);}
.year-day.sat{color:var(--accent);}
.year-day.sun{color:var(--red);}
.year-day.other{opacity:.2;}

/* Day view */
.day-view{display:flex;flex-direction:column;gap:12px;}

/* Work */
.work-layout{display:grid;grid-template-columns:1fr 210px;gap:16px;align-items:start;}
.work-cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);}
.work-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.work-dow{padding:6px 4px;text-align:center;font-size:11px;font-weight:600;font-family:var(--font-ui);color:var(--text3);}
.work-dow.sat{color:var(--accent);}
.work-dow.sun{color:var(--red);}
.work-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px 5px;min-height:90px;overflow:hidden;}
.work-cell.empty{background:var(--surface2);opacity:.4;}
.work-cell.today .work-num{color:var(--accent);font-weight:700;}
.work-cell.sat .work-num{color:var(--accent);}
.work-cell.sun .work-num{color:var(--red);}
.work-cell.golf-worked{background:#FEF3DC;}
.work-cell.worked{background:#E0F5FA;}
.work-cell.period-day{background:var(--pink-bg);}
.work-num{font-size:11px;color:var(--text2);font-weight:500;line-height:1;}
.work-bar-bg{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:4px;}
.work-bar-fill{height:100%;border-radius:3px;transition:width .3s;}
.work-time-inp{width:100%;padding:3px 4px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:11px;background:var(--bg);color:var(--text);outline:none;font-family:var(--font);}
.work-time-inp:focus{border-color:var(--accent);}
.work-hr-lbl{font-size:9px;color:var(--text3);margin-top:1px;text-align:right;}

/* Golf cells */
.golf-cell{min-height:90px;cursor:pointer;}
.golf-empty{font-size:16px;color:var(--text3);text-align:center;padding:6px 0;cursor:pointer;}
.golf-empty:hover{color:#BA7517;}
.golf-round-tag{display:flex;align-items:center;gap:3px;font-size:10px;margin-bottom:2px;}
.golf-holes{background:#FEF3DC;color:#BA7517;padding:1px 4px;border-radius:3px;font-weight:600;}
.golf-add{font-size:11px;color:var(--text3);text-align:center;cursor:pointer;padding:1px 0;}
.golf-add:hover{color:#BA7517;}
.golf-hole-btn{padding:3px 8px;border:1px solid var(--border2);border-radius:var(--radius-xs);background:none;cursor:pointer;font-size:11px;font-family:var(--font);color:var(--text2);}
.golf-hole-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.golf-hole-custom{width:50px;padding:3px 6px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:11px;background:var(--bg);color:var(--text);outline:none;}
.golf-amt{width:100%;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:12px;background:var(--bg);color:var(--text);outline:none;}
.golf-amt:focus{border-color:var(--accent);}
.golf-wx-btn{width:36px;height:36px;font-size:18px;background:var(--surface2);border:2px solid transparent;border-radius:var(--radius-xs);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.golf-wx-btn.active{border-color:var(--accent);background:var(--accent-bg);}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px);}
.modal{background:var(--surface);border-radius:var(--radius);padding:22px;width:420px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px;font-family:var(--font-ui);}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface);padding-bottom:2px;}
.form-row{margin-bottom:11px;}
.form-row label{display:block;font-size:10px;font-weight:600;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:13px;font-family:var(--font);background:var(--bg);color:var(--text);outline:none;transition:border-color .1s;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent);}
.form-row textarea{resize:vertical;min-height:70px;line-height:1.6;}
.btn-save{padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-xs);cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;}
.btn-save:hover{opacity:.9;}
.btn-cancel{padding:7px 12px;background:none;border:1px solid var(--border2);border-radius:var(--radius-xs);cursor:pointer;font-size:13px;font-family:var(--font);color:var(--text2);}
.btn-cancel:hover{background:var(--surface2);}
.btn-del{padding:7px 12px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-bg);border-radius:var(--radius-xs);cursor:pointer;font-size:13px;font-family:var(--font);}
.btn-del:hover{border-color:var(--red);}
.color-row{display:flex;flex-wrap:wrap;gap:5px;}
.color-sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;flex-shrink:0;}
.color-sw:hover{transform:scale(1.15);}
.color-sw.selected{border-color:var(--text);transform:scale(1.1);}
.cell-color-picker{position:fixed;z-index:2000;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:10px;width:172px;}

/* Todos */
.todo-item{display:flex;align-items:center;gap:8px;padding:5px 14px;}
.todo-item:hover{background:var(--surface2);}
.todo-cb{accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.todo-txt{flex:1;font-size:13px;line-height:1.4;}
.todo-txt.done{text-decoration:line-through;color:var(--text3);}
.todo-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:2px 4px;}
.todo-del:hover{color:var(--red);}
.quick-add{display:flex;gap:8px;padding:9px 14px;border-top:1px solid var(--border);}
.quick-add input{flex:1;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:var(--font);}
.quick-add input:focus{border-color:var(--accent);}
.quick-add button{padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-xs);cursor:pointer;font-size:16px;}
.empty{padding:18px;text-align:center;font-size:13px;color:var(--text3);}

/* Type tabs */
.type-tabs{display:flex;gap:4px;margin-bottom:12px;}
.type-tab{flex:1;padding:6px;border:1px solid var(--border2);border-radius:var(--radius-xs);background:none;cursor:pointer;font-size:12px;font-family:var(--font);color:var(--text2);text-align:center;}
.type-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Period */
.period-cell-dot{font-size:10px;text-align:center;color:var(--pink);}

/* Class memo table */
.class-memo-table{width:100%;border-collapse:collapse;}
.class-memo-table th{font-size:11px;color:var(--text3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);font-weight:600;}
.class-memo-table td{padding:4px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.class-memo-inp{width:100%;padding:5px 7px;border:1px solid transparent;border-radius:var(--radius-xs);font-size:12px;background:transparent;color:var(--text);outline:none;font-family:var(--font);}
.class-memo-inp:focus{border-color:var(--accent);background:var(--bg);}

/* Studio save row */
.studio-save-row{display:flex;gap:4px;margin-top:4px;}
.studio-save-btn{flex:1;padding:3px 6px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-xs);cursor:pointer;font-size:10px;font-family:var(--font);}
.studio-del-btn{padding:3px 6px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-bg);border-radius:var(--radius-xs);cursor:pointer;font-size:10px;font-family:var(--font);}

@media print{.sidebar,.topbar,#sync-status,.modal-overlay,.filter-bar,#backup-status{display:none !important;}.body{display:block !important;}.main{overflow:visible !important;}.content{padding:0 !important;}body{background:#fff !important;}.card{box-shadow:none !important;border:1px solid #ddd !important;}}

@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:200;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.15);}
  .main{margin-left:0 !important;}
  .sidebar.open{transform:translateX(0);}
  .sb-overlay.open{display:block;}
  .ham-btn{display:flex !important;}
  .work-layout{grid-template-columns:1fr !important;}
  .year-view{grid-template-columns:repeat(2,1fr) !important;}
  .modal{width:100% !important;max-width:100vw !important;border-radius:var(--radius) var(--radius) 0 0 !important;margin:0 !important;}
  .modal-overlay{align-items:flex-end !important;}
  .modal-footer{position:sticky;bottom:0;}
  .btn-save,.btn-cancel,.btn-del{min-height:44px;font-size:14px !important;}
  input[type=time],input[type=date],input[type=text],input[type=number],select,textarea{font-size:16px !important;}
  .content{padding:10px;}
}
</style>
</head>
<body>
<!-- Login -->
<div id="login-screen">
  <div class="login-logo">JINHAE<span>.</span></div>
  <div class="login-sub">Personal Schedule</div>
  <button class="login-btn" onclick="signIn()">
    <img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G">
    Google로 로그인
  </button>
  <div class="login-loading" id="login-loading"></div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <button class="ham-btn" onclick="toggleSb()">☰</button>
    <button class="tb-nav" onclick="navigate(-1)">‹</button>
    <button class="tb-nav" onclick="goToday()" style="font-family:var(--font-ui)">Today</button>
    <button class="tb-nav" onclick="navigate(1)">›</button>
    <div class="tb-title" id="main-title"></div>
    <div id="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-txt">Synced</span></div>
    <button class="tb-btn" onclick="window.print()">🖨</button>
    <button class="tb-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
  </div>

  <div class="body">
    <div class="sb-overlay" id="sb-overlay" onclick="closeSb()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sb-header">
        <div class="sb-logo">JINHAE<span>.</span></div>
        <div class="sb-user">
          <div class="sb-avatar" id="user-avatar">J</div>
          <span class="sb-name" id="user-name">Loading...</span>
          <button class="sb-logout" onclick="signOut()">Sign out</button>
        </div>
      </div>

      <div class="nav-sec">
        <div class="nav-lbl">View</div>
        <button class="nav-btn" data-view="home" onclick="setView('home')"><span class="nav-icon">🏠</span>Home</button>
        <button class="nav-btn" data-view="year" onclick="setView('year')"><span class="nav-icon">◎</span>Year</button>

const parseDate=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const ym=(y,mo,d)=>`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const timeDiff=(a,b)=>{if(!a||!b)return 0;const[ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number);return(bh*60+bm)-(ah*60+am);};
const makeId=()=>{
  try{return crypto.randomUUID();}
  catch(e){
    // fallback: RFC4122 compliant UUID
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);});
  }
};
const escH=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let state={view:'home',cursor:new Date(today),selected:todayStr(),projFilter:null,timedFilter:null};

// ── Helpers ───────────────────────────────────────────────
function proj(id){return data.projects.find(p=>p.id===id)||{name:'',color:'#999'};}
function timedCat(id){return data.timedCats.find(c=>c.id===id)||{name:'',color:'#4472C4',emoji:''};}
function timedEventsOn(ds){
  let tes=data.timedEvents.filter(t=>t.date===ds);
  if(state.timedFilter)tes=tes.filter(t=>t.categoryId===state.timedFilter);
  return tes.sort((a,b)=>a.time.localeCompare(b.time));
}
function projEventsOn(ds){
  let evs=data.projEvents.filter(e=>e.date===ds);
  if(state.projFilter)evs=evs.filter(e=>e.projectId===state.projFilter);
  return evs;
}
function tasksOn(ds,noSub){
  let tds=data.tasks.filter(t=>t.date===ds);
  if(noSub)tds=tds.filter(t=>!t.eventId); // 세부항목 제외
  if(state.projFilter)tds=tds.filter(t=>t.projectId===state.projFilter);
  return tds;
}
function getAnnivs(ds){
  const d=parseDate(ds),m=d.getMonth()+1,day=d.getDate(),yr=d.getFullYear();
  return data.anniversaries.filter(a=>a.repeatYearly?a.month===m&&a.day===day:a.month===m&&a.day===day&&(!a.year||a.year===yr));
}
function orderedProjects(){
  if(data.projOrder.length>0){
    const ordered=[];
    data.projOrder.forEach(id=>{const p=data.projects.find(x=>x.id===id);if(p)ordered.push(p);});
    data.projects.forEach(p=>{if(!data.projOrder.includes(p.id))ordered.push(p);});
    return ordered;
  }
  return data.projects;
}

// ── Load All ──────────────────────────────────────────────
async function loadAll(){
  setSyncing();
  try{
    const uid=currentUser.id;
    const[teRes,tcRes,peRes,tdRes,prRes,gRes,oRes,ccRes,anRes,plRes,hnRes,cmRes]=await Promise.all([
      sb.from('timed_events').select('*').eq('user_id',uid),
      sb.from('timed_categories').select('*').eq('user_id',uid),
      sb.from('events').select('*').eq('user_id',uid),
      sb.from('todos').select('*').eq('user_id',uid),
      sb.from('projects').select('*').eq('user_id',uid),
      sb.from('golf').select('*').eq('user_id',uid),
      sb.from('office').select('*').eq('user_id',uid),
      sb.from('cell_colors').select('*').eq('user_id',uid),
      sb.from('anniversaries').select('*').eq('user_id',uid),
      sb.from('period_logs').select('*').eq('user_id',uid),
      sb.from('home_notes').select('*').eq('user_id',uid).maybeSingle(),
      sb.from('class_memos').select('*').eq('user_id',uid),
    ]);

    data.timedCats=(tcRes.data||[]).map(c=>({id:c.id,name:c.name,color:c.color||'#4472C4',emoji:c.emoji||''}));
    data.timedEvents=(teRes.data||[]).map(t=>({id:t.id,title:t.title,date:t.date,time:t.time,categoryId:t.category_id||''}));
    data.projEvents=(peRes.data||[]).map(e=>({id:e.id,title:e.title,date:e.date,start:e.start||'',projectId:e.project_id||'',color:e.color||'',note:e.note||''}));
    data.tasks=(tdRes.data||[]).map(t=>({id:t.id,title:t.title,date:t.date||'',projectId:t.project_id||'',done:t.done||false,eventId:t.event_id||''}));

    // Projects - default 5 if empty
    if((prRes.data||[]).length===0){
      const defs=[{id:makeId(),name:'개인',color:'#2D6BE4'},{id:makeId(),name:'수업 · 과제',color:'#1D9E75'},{id:makeId(),name:'박사 논문',color:'#6C4FBF'},{id:makeId(),name:'HAEGOBJ',color:'#D4537E'},{id:makeId(),name:'기타',color:'#7C6F5B'}];
      data.projects=defs;
      await sb.from('projects').insert(defs.map(p=>({id:p.id,user_id:uid,name:p.name,color:p.color})));
    } else {
      data.projects=(prRes.data||[]).map(p=>({id:p.id,name:p.name,color:p.color||'#4472C4'}));
    }

    data.golf={};(gRes.data||[]).forEach(g=>{data.golf[g.date]={rounds:g.rounds||[],weather:g.weather||''};});
    data.office={};(oRes.data||[]).forEach(o=>{data.office[o.date]={in:o.time_in||'',out:o.time_out||''};});
    data.cellColors={};(ccRes.data||[]).forEach(c=>{data.cellColors[c.date]=c.color;});
    data.anniversaries=(anRes.data||[]).map(a=>({id:a.id,name:a.name,emoji:a.emoji||'🎉',month:a.month,day:a.day,year:a.year||null,repeatYearly:a.repeat_yearly}));
    data.periodLogs=(plRes.data||[]).map(p=>({id:p.id,startDate:p.start_date})).sort((a,b)=>b.startDate.localeCompare(a.startDate));
    data.homeNote=hnRes.data?.note1||'';
    data.classMemos={};(cmRes.data||[]).forEach(m=>{data.classMemos[`${m.project_id}_${m.week}`]=m.content||'';});

    setSynced();renderAll();
  }catch(e){console.error(e);setSyncErr('Load Error');}
}

async function saveTimedEvent(te){
  setSyncing();
  const{error}=await sb.from('timed_events').upsert({id:te.id,user_id:currentUser.id,title:te.title,date:te.date,time:te.time,category_id:te.categoryId||null});
  if(error){setSyncErr('Save Error');return error.message;}setSynced();return null;
}
async function delTimedEvent(id,backup){
  setSyncing();
  const{error}=await sb.from('timed_events').delete().eq('id',id).eq('user_id',currentUser.id);
  if(error){if(backup)data.timedEvents.push(backup);renderAll();setSyncErr('Delete Error');alert('Delete failed');}
  else setSynced();
}
async function saveProjEvent(ev){
  setSyncing();
  const{error}=await sb.from('events').upsert({id:ev.id,user_id:currentUser.id,title:ev.title,date:ev.date,start:ev.start||null,end:null,project_id:ev.projectId||null,color:ev.color||null,note:ev.note||null});
  if(error){setSyncErr('Save Error');return error.message;}setSynced();return null;
}
async function delProjEvent(id,backup,subBackup){
  setSyncing();
  const{error}=await sb.from('events').delete().eq('id',id).eq('user_id',currentUser.id);
  if(error){
    if(backup)data.projEvents.push(backup);
    if(subBackup&&subBackup.length)data.tasks.push(...subBackup);
    renderAll();setSyncErr('Delete Error');alert('Delete failed');
  } else {
    // 이벤트 삭제 성공 시 연결된 tasks도 DB에서 삭제
    if(subBackup&&subBackup.length){
      await sb.from('todos').delete().in('id',subBackup.map(t=>t.id)).eq('user_id',currentUser.id);
    }
    setSynced();
  }
}

// ── Navigation ────────────────────────────────────────────
function setView(v){
  state.view=v;
  if(window.innerWidth<=768)closeSb();
  document.querySelectorAll('.nav-btn[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  renderAll();
}
function navigate(dir){
  const c=state.cursor;
  if(['day'].includes(state.view))c.setDate(c.getDate()+dir);
  else if(['month','studio','golf','period'].includes(state.view))c.setMonth(c.getMonth()+dir);
  else if(['year','travel'].includes(state.view))c.setFullYear(c.getFullYear()+dir);
  state.cursor=new Date(c);renderAll();
}
function goToday(){state.cursor=new Date(today);state.selected=todayStr();renderAll();}
function selectDay(ds){state.selected=ds;state.cursor=parseDate(ds);renderAll();}
function jumpToDay(ds){state.selected=ds;state.cursor=parseDate(ds);setView('day');}
function setProjFilter(pid){
  state.projFilter=pid;
  if(pid)state.timedFilter=null; // 동시 필터 방지
  if(pid&&['golf','studio','period','day','travel'].includes(state.view)){
    state.view='month';
    document.querySelectorAll('.nav-btn[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view==='month'));
  }
  if(window.innerWidth<=768)closeSb();
  renderAll();
}
function setTimedFilter(id){
  state.timedFilter=id;
  if(id)state.projFilter=null; // 동시 필터 방지
  if(id&&['golf','studio','period','day','travel'].includes(state.view)){
    state.view='month';
    document.querySelectorAll('.nav-btn[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view==='month'));
  }
  if(window.innerWidth<=768)closeSb();
  renderAll();
}

function renderAll(){
  if(!currentUser)return;
  updateTitle();renderSidebar();renderFilterBar();
  const views={home:renderHome,year:renderYear,month:renderMonth,day:renderDay,golf:renderGolf,studio:renderStudio,period:renderPeriod,travel:renderTravel};
  (views[state.view]||renderHome)();
}
function updateTitle(){
  const c=state.cursor;
  const titles={home:'🏠 Home',year:c.getFullYear()+'년',travel:'✈️ Travel — '+c.getFullYear()+'년',month:c.getFullYear()+'년 '+(c.getMonth()+1)+'월',day:c.getFullYear()+'년 '+(c.getMonth()+1)+'월 '+c.getDate()+'일 ('+['일','월','화','수','목','금','토'][c.getDay()]+')',golf:'⛳ Golf — '+c.getFullYear()+'년 '+(c.getMonth()+1)+'월',studio:'🏢 Studio — '+c.getFullYear()+'년 '+(c.getMonth()+1)+'월',period:'🌸 Period — '+c.getFullYear()+'년 '+(c.getMonth()+1)+'월'};
  document.getElementById('main-title').textContent=titles[state.view]||'';
}
function renderSidebar(){
  // Projects
  const projs=orderedProjects();
  const totalEv=data.projEvents.length;
  document.getElementById('proj-all-cnt').textContent=totalEv;
  document.getElementById('proj-all-btn').className='proj-btn'+(state.projFilter===null?' active':'');
  let ph='';
  projs.forEach(p=>{
    const cnt=data.projEvents.filter(e=>e.projectId===p.id).length;
    ph+=`<div style="display:flex;align-items:center">
      <button class="proj-btn${state.projFilter===p.id?' active':''}" onclick="setProjFilter('${p.id}')" style="flex:1">
        <span class="proj-dot" style="background:${p.color}"></span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(p.name)}</span>
        <span class="proj-cnt">${cnt}</span>
      </button>
    </div>`;
  });
  document.getElementById('proj-nav-list').innerHTML=ph;

  // Timed cats
  document.getElementById('te-all-cnt').textContent=data.timedEvents.length;
  document.getElementById('te-all-btn').className='proj-btn'+(state.timedFilter===null?' active':'');
  let th='';
  data.timedCats.forEach(c=>{
    const cnt=data.timedEvents.filter(t=>t.categoryId===c.id).length;
    th+=`<button class="proj-btn${state.timedFilter===c.id?' active':''}" onclick="setTimedFilter('${c.id}')">
      <span class="proj-dot" style="background:${c.color}"></span>
      <span>${c.emoji?c.emoji+' ':''}${escH(c.name)}</span>
      <span class="proj-cnt">${cnt}</span>
    </button>`;
  });
  document.getElementById('te-cat-list').innerHTML=th;
}
function renderFilterBar(){
  const bar=document.getElementById('filter-bar');
  if(!state.projFilter&&!state.timedFilter){bar.style.display='none';return;}
  bar.style.display='flex';
  let html='<span style="font-size:12px;color:var(--text3)">Filter:</span>';
  if(state.projFilter){
    const p=proj(state.projFilter);
    html+=`<span class="filter-chip" style="background:${p.color}">${escH(p.name)}</span>
      <button onclick="setProjFilter(null)" class="btn-cancel" style="font-size:11px;padding:2px 8px;border-radius:12px">✕</button>`;
  }
  if(state.timedFilter){
    const c=timedCat(state.timedFilter);
    html+=`<span class="filter-chip" style="background:${c.color}">${c.emoji?c.emoji+' ':''}${escH(c.name)}</span>
      <button onclick="setTimedFilter(null)" class="btn-cancel" style="font-size:11px;padding:2px 8px;border-radius:12px">✕</button>`;

}

// ── Home ──────────────────────────────────────────────────
function renderHome(){
  const ds=todayStr();
  const tes=timedEventsOn(ds),pevs=projEventsOn(ds),tds=data.tasks.filter(t=>!t.done&&!t.eventId);
  const d=new Date();
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  let html=`<div style="display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start">`;
  html+=`<div style="display:flex;flex-direction:column;gap:12px">`;
  // Header
  html+=`<div class="card" style="padding:16px 18px;display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-size:17px;font-weight:600;font-family:var(--font-ui)">${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:3px">Events ${tes.length+pevs.length} · Tasks ${tds.length}</div>
    </div>
    <button onclick="setView('month')" class="btn-save" style="border-radius:20px;font-size:12px;padding:6px 14px">Calendar →</button>
  </div>`;
  // Today schedule
  if(tes.length+pevs.length>0){
    html+=`<div class="card" style="overflow:hidden">
      <div style="padding:9px 14px;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);letter-spacing:.5px;text-transform:uppercase">Today</div>`;
    tes.forEach(te=>{const cat=timedCat(te.categoryId),c=cat.color||'#4472C4';html+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid var(--border);cursor:pointer" onclick="openEditItem('timed','${te.id}')"><span style="font-size:11px;font-weight:600;color:${c};width:36px;flex-shrink:0">${te.time}</span><span style="font-size:13px">${cat.emoji?cat.emoji+' ':''}${escH(te.title)}</span></div>`;});
    pevs.forEach(ev=>{const p=proj(ev.projectId),c=p.color||'#4472C4';html+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid var(--border);cursor:pointer" onclick="openEditItem('proj','${ev.id}')"><span style="font-size:11px;font-weight:600;color:${c};width:36px;flex-shrink:0">${ev.start||'--:--'}</span><span style="font-size:13px">${escH(ev.title)}</span></div>`;});
    html+=`</div>`;
  }
  // Memo
  html+=`<div class="card" style="overflow:hidden">
    <div style="padding:9px 14px;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);letter-spacing:.5px;text-transform:uppercase">Memo</div>
    <textarea id="home-memo" style="width:100%;min-height:200px;padding:12px 14px;border:none;background:transparent;font-size:13px;font-family:var(--font);color:var(--text);resize:vertical;outline:none;box-sizing:border-box;line-height:1.7" placeholder="Free notes..." oninput="homeNoteChange(this.value)">${escH(data.homeNote)}</textarea>
  </div>`;
  html+=`</div>`;
  // Right: todos
  html+=`<div class="card" style="overflow:hidden;position:sticky;top:14px">
    <div style="padding:9px 14px;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between">Todo List<span style="background:var(--accent);color:#fff;font-size:10px;padding:1px 7px;border-radius:8px">${tds.length}</span></div>
    <div style="max-height:calc(100vh - 200px);overflow-y:auto">`;
  if(tds.length===0)html+=`<div class="empty">All done! 🎉</div>`;
  else tds.forEach(td=>{
    const p=proj(td.projectId);
    html+=`<div class="todo-item"><input type="checkbox" class="todo-cb" onchange="toggleTask('${td.id}',this.checked)"><div style="flex:1;min-width:0"><div class="todo-txt">${escH(td.title)}</div>${p.name?`<div style="font-size:10px;color:${p.color}">${p.name}</div>`:''}</div><button class="todo-del" onclick="deleteTask('${td.id}')">✕</button></div>`;
  });
  html+=`</div>
    <div class="quick-add">
      <input type="text" id="home-todo-inp" placeholder="Add task..." onkeydown="if(event.key==='Enter')addHomeTask()">
      <button onclick="addHomeTask()">+</button>
    </div>
  </div>`;
  html+=`</div>`;
  document.getElementById('main-content').innerHTML=html;
}
let _homeNoteTimer=null;
function homeNoteChange(v){data.homeNote=v;clearTimeout(_homeNoteTimer);_homeNoteTimer=setTimeout(()=>saveHomeNote(v),1500);}
async function addHomeTask(){
  const inp=document.getElementById('home-todo-inp');
  const title=inp.value.trim();if(!title)return;
  const td={id:makeId(),title,date:todayStr(),projectId:'',done:false,eventId:''};
  data.tasks.push(td);inp.value='';renderAll();
  const err=await saveTask(td);if(err){data.tasks=data.tasks.filter(t=>t.id!==td.id);renderAll();}
}

// ── Month ─────────────────────────────────────────────────
function renderMonth(){
  const yr=state.cursor.getFullYear(),mo=state.cursor.getMonth();
  const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0),todS=todayStr();
  const offset=(first.getDay()||7)-1;
  let html=`<div class="card month-view"><div class="month-hdr">`;
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach((d,i)=>html+=`<div class="month-dow${i===5?' sat':i===6?' sun':''}">${d}</div>`);
  html+=`</div><div class="month-grid">`;
  let cells=[];
  for(let i=0;i<offset;i++){let d=new Date(yr,mo,1-offset+i);cells.push({date:d,other:true});}
  for(let i=1;i<=last.getDate();i++)cells.push({date:new Date(yr,mo,i),other:false});
  const rem=7-(cells.length%7);if(rem<7)for(let i=1;i<=rem;i++)cells.push({date:new Date(yr,mo+1,i),other:true});
  cells.forEach(cell=>{
    const ds=fmtDate(cell.date),isT=ds===todS,isSel=ds===state.selected;
    const dow=cell.date.getDay(),di=dow===0?6:dow-1;
    const hol=!cell.other?holName(ds):'';
    const annivs=!cell.other?getAnnivs(ds):[];
    const numColor=hol?'color:var(--red)':di===5?'color:var(--accent)':di===6?'color:var(--red)':'';
    const cellBg=!cell.other&&data.cellColors[ds]?data.cellColors[ds]:'';
    html+=`<div class="month-cell${cell.other?' other':''}${isT?' today':''}${isSel?' selected':''}" style="${cellBg?`background:${cellBg}1A;`:''}"
      onclick="selectDay('${ds}');${!cell.other?`openAddModal('${ds}')`:''}"
      oncontextmenu="event.preventDefault();${!cell.other?`openCellColorPicker('${ds}',event)`:''}">`;
    let lbls='';
    if(!cell.other){
      if(hol)lbls+=`<span style="font-size:9px;color:var(--red);font-weight:500;margin-left:3px">${hol}</span>`;
      annivs.forEach(a=>lbls+=`<span style="font-size:9px;color:var(--accent);font-weight:500;margin-left:3px">${a.emoji||''}${a.name}</span>`);
    }
    html+=`<div class="month-cell-num" style="${numColor}${cellBg&&!cell.other?`color:${cellBg};font-weight:700;`:''}">
      <span>${cell.date.getDate()}</span>${cellBg&&!cell.other?`<span class="cell-dot" style="background:${cellBg}"></span>`:''}${lbls}
    </div>`;
    // timedFilter 있으면 timed events만, projFilter 있으면 proj/tasks만
    if(!state.projFilter){
      timedEventsOn(ds).forEach(te=>{const cat=timedCat(te.categoryId),c=cat.color||'#4472C4';html+=`<div class="month-ev" style="background:${evBg(c)};color:${evTxt(c)};display:flex;gap:2px" onclick="event.stopPropagation();openEditItem('timed','${te.id}')"><span style="opacity:.75;font-size:9px;flex-shrink:0">${te.time}</span><span style="overflow:hidden;text-overflow:ellipsis">${escH(te.title)}</span></div>`;});
    }
    if(!state.timedFilter){
      projEventsOn(ds).forEach(ev=>{const p=proj(ev.projectId),c=p.color||'#4472C4';html+=`<div class="month-ev" style="background:${evBg(c)};color:${evTxt(c)}" onclick="event.stopPropagation();openEditItem('proj','${ev.id}')">${escH(ev.title)}</div>`;});
      tasksOn(ds,true).forEach(td=>{const p=proj(td.projectId),c=p.color||'#999';html+=`<div class="month-ev" style="background:${evBg(c)};color:${evTxt(c)}">${td.done?'✓ ':''}${escH(td.title)}</div>`;});
    }
    html+=`</div>`;
  });
  html+=`</div></div>`;

  // If timed filter active, show timed events list below
  if(state.timedFilter){
    const cat=timedCat(state.timedFilter);
    const yr=state.cursor.getFullYear();
    const tes=data.timedEvents.filter(t=>t.categoryId===state.timedFilter&&t.date.startsWith(yr+'')).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    html+=`<div class="card" style="margin-top:14px;overflow:hidden">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px">
        <span style="width:10px;height:10px;border-radius:50%;background:${cat.color};display:inline-block"></span>${cat.emoji?cat.emoji+' ':''}${escH(cat.name)} ${yr}년 일정
        <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:auto">${tes.length}개</span>
      </div>`;
    if(tes.length===0)html+=`<div class="empty">No events</div>`;
    else tes.forEach(te=>{
      const memoKey=`te_memo_${te.id}`;
      const memoVal=data.classMemos[memoKey]||'';
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--border)">
        <div style="cursor:pointer;display:flex;align-items:center;gap:8px;flex-shrink:0" onclick="openEditItem('timed','${te.id}')">
          <span style="font-size:11px;color:var(--text3);width:76px;flex-shrink:0">${te.date}</span>
          <span style="font-size:11px;font-weight:600;color:${cat.color};width:36px;flex-shrink:0">${te.time}</span>
          <span style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${escH(te.title)}</span>
        </div>
        <input type="text" value="${escH(memoVal)}" placeholder="메모..."
          style="flex:1;min-width:0;padding:4px 10px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:12px;background:var(--bg);color:var(--text);outline:none;font-family:var(--font);margin-left:8px"
          onblur="saveEvMemo('te_${te.id}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"
          onclick="event.stopPropagation()">
      </div>`;
    });
    html+=`</div>`;
  }

  // If project filter active, show all events below
  if(state.projFilter){
    const p=proj(state.projFilter);
    const evs=data.projEvents.filter(e=>e.projectId===state.projFilter).sort((a,b)=>a.date.localeCompare(b.date));
    html+=`<div class="card" style="margin-top:14px;overflow:hidden">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px">
        <span style="width:10px;height:10px;border-radius:50%;background:${p.color};display:inline-block"></span>${escH(p.name)} 전체 일정
        <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:auto">${evs.length}개</span>
      </div>`;
    if(evs.length===0)html+=`<div class="empty">No events</div>`;
    else evs.forEach(ev=>{
      const memoKey=`ev_memo_${ev.id}`;
      const memoVal=data.classMemos[memoKey]||'';
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--border)">
        <div style="cursor:pointer;display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:0" onclick="openEditItem('proj','${ev.id}')">
          <span style="font-size:11px;color:var(--text3);width:76px;flex-shrink:0">${ev.date}</span>
          <span style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${escH(ev.title)}</span>
        </div>
        <input type="text" value="${escH(memoVal)}" placeholder="메모..."
          style="flex:1;min-width:0;padding:4px 10px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:12px;background:var(--bg);color:var(--text);outline:none;font-family:var(--font);margin-left:8px"
          onblur="saveEvMemo('${ev.id}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"
          onclick="event.stopPropagation()">
      </div>`;
    });
    html+=`</div>`;


  }

  document.getElementById('main-content').innerHTML=html;
}
async function saveEvMemo(evId,val){
  const key=`ev_memo_${evId}`;
  data.classMemos[key]=val;
  // event_id를 project_id로 사용해서 저장 (week=0)
  await saveClassMemo(evId,0,val);
}
async function saveClassMemoInp(pid,week,content){
  data.classMemos[`${pid}_${week}`]=content;
  await saveClassMemo(pid,week,content);
}

// ── Year ──────────────────────────────────────────────────
function renderYear(){
  const yr=state.cursor.getFullYear(),todS=todayStr();
  let html=`<div class="year-view">`;
  for(let mo=0;mo<12;mo++){
    html+=`<div class="card" style="padding:12px"><div style="font-size:12px;font-weight:500;margin-bottom:8px">${MONTHS[mo]}</div><div class="year-mini">`;
    ['M','T','W','T','F','S','S'].forEach((d,i)=>html+=`<div class="year-dow" style="${i===5?'color:var(--accent)':i===6?'color:var(--red)':''}">${d}</div>`);
    const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
    const offset=(first.getDay()||7)-1;
    for(let i=0;i<offset;i++)html+=`<div class="year-day other"></div>`;
    for(let d=1;d<=last.getDate();d++){
      const ds=ym(yr,mo,d),isT=ds===todS;
      const hasEv=data.projEvents.some(e=>e.date===ds)||data.tasks.some(t=>t.date===ds&&!t.eventId)||data.timedEvents.some(t=>t.date===ds);
      const dow=new Date(yr,mo,d).getDay(),di=dow===0?6:dow-1;
      const holiday=isHol(ds);
      const cls='year-day'+(isT?' today':hasEv?' has-ev':'')+(holiday&&!isT?' sun':di===5&&!isT?' sat':di===6&&!isT?' sun':'');
      html+=`<div class="${cls}" onclick="jumpToDay('${ds}')">${d}</div>`;
    }
    html+=`</div></div>`;
  }
  html+=`</div>`;
  document.getElementById('main-content').innerHTML=html;
}
// ── Day View ──────────────────────────────────────────────
if(!window.dayBlocks)window.dayBlocks={};
if(!window.dayBlockCols)window.dayBlockCols=['','',''];
function renderDay(){
  const ds=fmtDate(state.cursor);
  const tes=timedEventsOn(ds),pevs=projEventsOn(ds),alltds=tasksOn(ds);
  const hol=holName(ds);
  if(!window.dayBlocks[ds])window.dayBlocks[ds]={};

  // Time block columns - 3 fixed, user-named
  const cols=window.dayBlockCols;

  let html=`<div class="day-view">`;

  // Events header
  html+=`<div class="card" style="overflow:hidden">
    <div style="padding:9px 14px;font-size:13px;font-weight:500;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
      ${state.cursor.getMonth()+1}월 ${state.cursor.getDate()}일
      ${hol?`<span style="color:var(--red);font-size:11px;font-weight:400">· ${hol}</span>`:''}
      <button onclick="openAddModal('${ds}')" class="btn-save" style="margin-left:auto;border-radius:16px;font-size:11px;padding:4px 12px">+ Add</button>
    </div>`;

  // Timed events strip
  if(tes.length>0){
    html+=`<div style="padding:7px 12px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--border)">`;
    tes.forEach(te=>{const cat=timedCat(te.categoryId),c=cat.color||'#4472C4';html+=`<div style="background:${evBg(c)};color:${evTxt(c)};border-radius:12px;padding:3px 10px;font-size:12px;cursor:pointer;display:flex;gap:4px;align-items:center" onclick="openEditItem('timed','${te.id}')"><span style="font-weight:600">${te.time}</span><span>${cat.emoji?cat.emoji+' ':''}${escH(te.title)}</span></div>`;});
    html+=`</div>`;
  }

  // Project events
  if(pevs.length>0){
    html+=`<div style="padding:7px 12px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--border)">`;
    pevs.forEach(ev=>{const p=proj(ev.projectId),c=p.color||'#4472C4';html+=`<div style="background:${evBg(c)};color:${evTxt(c)};border-radius:8px;padding:3px 10px;font-size:12px;cursor:pointer" onclick="openEditItem('proj','${ev.id}')"><span style="font-size:10px;opacity:.7">${p.name}</span> ${escH(ev.title)}</div>`;});
    html+=`</div>`;
  }

  if(tes.length+pevs.length===0)html+=`<div class="empty">No events today</div>`;
  html+=`</div>`;

  // Time blocks — columns = active projects today
  html+=`<div style="display:grid;grid-template-columns:3fr 2fr;gap:12px;align-items:start">`;
  html+=`<div class="card" style="overflow:hidden">
    <div style="padding:9px 14px;font-size:13px;font-weight:500;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      Time Blocks
      <div style="display:flex;gap:4px;margin-left:auto">
        ${cols.map((c,i)=>`<input type="text" value="${c}" placeholder="Col ${i+1}"
          style="width:60px;padding:2px 5px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:11px;background:var(--bg);color:var(--text);outline:none;text-align:center"
          onblur="setBlockCol(${i},this.value)" onkeydown="if(event.key==='Enter')this.blur()">`).join('')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:32px repeat(3,1fr);border-bottom:1px solid var(--border);background:var(--surface2)">
      <div></div>`;
  cols.forEach((c,i)=>html+=`<div style="font-size:10px;font-weight:600;color:var(--accent);padding:5px 4px;text-align:center;border-left:1px solid var(--border)">${escH(c)}</div>`);
  html+=`</div>`;
  const hrs=[];for(let h=7;h<=30;h++)hrs.push(h%24);
  hrs.forEach((h,hi)=>{
    const hs=String(h).padStart(2,'0')+':00';
    html+=`<div style="display:grid;grid-template-columns:32px repeat(3,1fr);border-bottom:1px solid var(--border);min-height:26px">
      <div style="font-size:9px;color:var(--text3);padding:2px 2px 0;text-align:right;line-height:1">${hs}</div>`;
    cols.forEach((colName,ci)=>{
      const key=`${h}_col${ci}`;
      const has=key in window.dayBlocks[ds];
      const val=has?window.dayBlocks[ds][key]:'';
      const prevH=hi>0?hrs[hi-1]:null;
      const isFirst=has&&(!prevH||(!((`${prevH}_col${ci}`) in window.dayBlocks[ds])));
      html+=`<div data-h="${h}" data-pid="col${ci}" data-ds="${ds}"
        style="border-left:1px solid var(--border);padding:2px 3px;cursor:crosshair;user-select:none;${has?'background:var(--accent-bg);':''}"
        onmousedown="startBlockDrag(event,'${ds}',${h},'col${ci}')"
        onmouseenter="continueBlockDrag(event,'${ds}',${h},'col${ci}')"
        onmouseup="endBlockDrag()"
        ontouchstart="startBlockDrag(event,'${ds}',${h},'col${ci}')"
        ontouchmove="touchMoveBlock(event)"
        ontouchend="endBlockDrag()">
        ${isFirst?`<input type="text" value="${escH(val)}" placeholder="note..."
          style="width:100%;border:none;background:transparent;font-size:10px;color:var(--accent-txt);outline:none;font-family:var(--font);pointer-events:auto"
          onmousedown="event.stopPropagation()"
          onblur="saveBlock('${ds}',${h},'col${ci}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()">`:''}
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`; // close timeblock card
  // Tasks - right column
  html+=`<div class="card" style="overflow:hidden;overflow-y:auto;max-height:700px">
    <div style="padding:9px 14px;font-size:13px;font-weight:500;border-bottom:1px solid var(--border)">Tasks</div>`;
  const linkedIds=new Set();
  pevs.forEach(ev=>{
    const subs=alltds.filter(t=>t.eventId===ev.id);
    if(!subs.length)return;
    const p=proj(ev.projectId),c=p.color||'#4472C4';
    html+=`<div style="padding:5px 14px;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:${c};cursor:pointer;padding:3px 0" onclick="openEditItem('proj','${ev.id}')">
        <span style="width:6px;height:6px;border-radius:50%;background:${c};display:inline-block"></span>${escH(ev.title)}
      </div>
      <div style="padding-left:14px">`;
    subs.forEach(td=>{
      linkedIds.add(td.id);
      html+=`<div class="todo-item" style="padding:3px 0"><input type="checkbox" class="todo-cb" ${td.done?'checked':''} onchange="toggleTask('${td.id}',this.checked)"><span class="todo-txt${td.done?' done':''}" style="flex:1">${escH(td.title)}</span><button class="todo-del" onclick="deleteTask('${td.id}')">✕</button></div>`;
    });
    html+=`<div style="padding:3px 0"><input type="text" placeholder="+ Add subtask..." style="width:100%;padding:3px 0;border:none;border-bottom:1px dashed var(--border2);font-size:12px;background:transparent;outline:none;font-family:var(--font);color:var(--text)" onkeydown="if(event.key==='Enter')addLinkedTask('${ev.id}','${ds}','${ev.projectId||''}',this)"></div>
      </div></div>`;
  });
  const unlinked=alltds.filter(t=>!linkedIds.has(t.id)&&!t.eventId);
  unlinked.forEach(td=>{
    const p=proj(td.projectId),c=p.color||'#999';
    html+=`<div class="todo-item"><input type="checkbox" class="todo-cb" ${td.done?'checked':''} onchange="toggleTask('${td.id}',this.checked)"><div style="flex:1;min-width:0"><div class="todo-txt${td.done?' done':''}">${escH(td.title)}</div>${p.name?`<div style="font-size:10px;color:${c}">${p.name}</div>`:''}</div><button class="todo-del" onclick="deleteTask('${td.id}')">✕</button></div>`;
  });
  if(alltds.length===0)html+=`<div class="empty">No tasks</div>`;
  html+=`<div class="quick-add">
    <input type="text" id="day-task-inp" placeholder="Add task..." onkeydown="if(event.key==='Enter')addDayTask('${ds}')">
    <button onclick="addDayTask('${ds}')">+</button>
  </div></div></div>`; // close tasks card + grid wrapper
  html+=`</div>`;
  document.getElementById('main-content').innerHTML=html;
}

// Block drag
let _drag=null;
function startBlockDrag(e,ds,h,pid){e.preventDefault();if(!window.dayBlocks[ds])window.dayBlocks[ds]={};const key=`${h}_${pid}`;const mode=(key in window.dayBlocks[ds])?'remove':'add';_drag={ds,pid,mode};if(mode==='add')window.dayBlocks[ds][key]='';else delete window.dayBlocks[ds][key];renderDay();}
function continueBlockDrag(e,ds,h,pid){if(!_drag||_drag.pid!==pid||_drag.ds!==ds)return;e.preventDefault();if(!window.dayBlocks[ds])window.dayBlocks[ds]={};const key=`${h}_${pid}`;if(_drag.mode==='add'){if(!(key in window.dayBlocks[ds])){window.dayBlocks[ds][key]='';renderDay();}}else{if(key in window.dayBlocks[ds]){delete window.dayBlocks[ds][key];renderDay();}}}
function endBlockDrag(){_drag=null;}
function touchMoveBlock(e){if(!_drag)return;e.preventDefault();const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);if(!el)return;const cell=el.closest('[data-h][data-pid]');if(!cell)return;continueBlockDrag(e,cell.dataset.ds,parseInt(cell.dataset.h),cell.dataset.pid);}
document.addEventListener('mouseup',()=>_drag=null);
function setBlockCol(i,name){
  window.dayBlockCols[i]=name||['작업','학습','기타'][i];
  renderDay();
}
function saveBlock(ds,h,pid,val){if(!window.dayBlocks[ds])window.dayBlocks[ds]={};const key=`${h}_${pid}`;if(val.trim()==='')delete window.dayBlocks[ds][key];else window.dayBlocks[ds][key]=val.trim();renderDay();}
// ── Golf ──────────────────────────────────────────────────
function renderGolf(){
  const yr=state.cursor.getFullYear(),mo=state.cursor.getMonth();
  const lastDay=new Date(yr,mo+1,0),firstDow=new Date(yr,mo,1).getDay();
  const offset=(firstDow||7)-1;
  let totalBase=0,totalOver=0,totalRounds=0,totalDays=0;
  for(let d=1;d<=lastDay.getDate();d++){
    const ds=ym(yr,mo,d),g=data.golf[ds];
    const rounds=g&&Array.isArray(g.rounds)?g.rounds:[];
    rounds.forEach(r=>{if(Number(r.amount)>0){totalBase+=Number(r.amount)||0;totalOver+=Number(r.overFee)||0;totalRounds++;}});
    if(rounds.some(r=>Number(r.amount)>0))totalDays++;
  }
  let html=`<div class="work-layout"><div class="card" style="overflow:hidden">
    <div style="padding:7px;font-size:11px;color:var(--text2);text-align:center;border-bottom:1px solid var(--border)">라운드 기록</div>
    <div class="work-cal-hdr">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i)=>`<div class="work-dow${i===5?' sat':i===6?' sun':''}">${d}</div>`).join('')}</div>
    <div class="work-grid">`;
  for(let i=0;i<offset;i++)html+=`<div class="work-cell empty"></div>`;
  for(let d=1;d<=lastDay.getDate();d++){
    const ds=ym(yr,mo,d),g=data.golf[ds];
    const rounds=g&&Array.isArray(g.rounds)?g.rounds:[];
    const weather=g&&g.weather?g.weather:'';
    const dow=new Date(yr,mo,d).getDay(),isTod=ds===todayStr();
    const hasWork=rounds.length>0||!!weather;
    const holiday=isHol(ds)&&!isTod;
    let content='';
    if(weather)content+=`<div style="font-size:15px;line-height:1;margin-bottom:2px" onclick="openGolfModal('${ds}')">${weather}</div>`;
    if(rounds.length>0){
      rounds.forEach(r=>{const base=Number(r.amount)||0,over=Number(r.overFee)||0;content+=`<div class="golf-round-tag" onclick="openGolfModal('${ds}')"><span class="golf-holes">${r.holes}H</span><span style="color:var(--text2);font-size:10px">${base.toLocaleString()}${over>0?`<span style="color:#0891B2"> +${over.toLocaleString()}</span>`:''}</span></div>`;});
      if(rounds.length<2)content+=`<div class="golf-add" onclick="openGolfModal('${ds}')">+</div>`;
    } else if(!weather){content=`<div class="golf-empty" onclick="openGolfModal('${ds}')">+</div>`;}

// ── Period ────────────────────────────────────────────────
function renderPeriod(){
  const yr=state.cursor.getFullYear(),mo=state.cursor.getMonth();
  const lastDay=new Date(yr,mo+1,0),firstDow=new Date(yr,mo,1).getDay();
  const offset=(firstDow||7)-1;
  const periodDates=new Set(data.periodLogs.map(p=>p.startDate));

  // Calculate cycle info
  const logs=[...data.periodLogs].sort((a,b)=>a.startDate.localeCompare(b.startDate));
  let cycles=[];
  for(let i=1;i<logs.length;i++){
    const a=parseDate(logs[i-1].startDate),b=parseDate(logs[i].startDate);
    cycles.push(Math.round((b-a)/(1000*60*60*24)));
  }
  const avgCycle=cycles.length?Math.round(cycles.reduce((a,b)=>a+b,0)/cycles.length):28;
  const lastLog=logs[logs.length-1];
  const nextDate=lastLog?fmtDate(new Date(parseDate(lastLog.startDate).getTime()+avgCycle*24*60*60*1000)):'';

  let html=`<div class="work-layout"><div class="card" style="overflow:hidden">
    <div style="padding:7px;font-size:11px;color:var(--text2);text-align:center;border-bottom:1px solid var(--border)">생리 기록 (날짜 클릭으로 기록)</div>
    <div class="work-cal-hdr">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i)=>`<div class="work-dow${i===5?' sat':i===6?' sun':''}">${d}</div>`).join('')}</div>
    <div class="work-grid">`;
  for(let i=0;i<offset;i++)html+=`<div class="work-cell empty"></div>`;
  for(let d=1;d<=lastDay.getDate();d++){
    const ds=ym(yr,mo,d),isPeriod=periodDates.has(ds);
    const dow=new Date(yr,mo,d).getDay(),isTod=ds===todayStr();
    html+=`<div class="work-cell${isTod?' today':''}${isPeriod?' period-day':''}${dow===6&&!isTod?' sat':dow===0&&!isTod?' sun':''}" style="cursor:pointer;min-height:70px" onclick="togglePeriod('${ds}')">
      <div class="work-num">${d}</div>
      ${isPeriod?`<div style="text-align:center;font-size:16px;margin-top:4px">🌸</div>`:''}
    </div>`;
  }
  html+=`</div></div>`;

  // Summary
  html+=`<div><div class="card" style="padding:16px">
    <div style="font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px"><span style="font-size:16px">🌸</span>주기 정보</div>`;
  if(avgCycle&&cycles.length>0){
    html+=`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:var(--text2)">평균 주기</span><span style="font-size:12px;font-weight:600">${avgCycle}일</span></div>`;
  }
  if(lastLog){
    html+=`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:var(--text2)">마지막 시작</span><span style="font-size:12px;font-weight:600">${lastLog.startDate}</span></div>`;
    if(nextDate)html+=`<div style="padding:10px;background:var(--pink-bg);border-radius:var(--radius-sm);text-align:center;margin-top:10px"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">예상 다음 시작</div><div style="font-size:15px;font-weight:700;color:var(--pink)">${nextDate}</div></div>`;
  }
  html+=`<div style="margin-top:12px;max-height:200px;overflow-y:auto">`;
  logs.slice().reverse().forEach((l,i)=>{
    const cycle=i<logs.length-1?cycles[cycles.length-1-i]:null;
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;flex:1">${l.startDate}</span>${cycle?`<span style="font-size:11px;color:var(--text3)">${cycle}일</span>`:''}<button onclick="delPeriodEntry('${l.id}')" class="todo-del" style="font-size:12px">✕</button></div>`;
  });
  html+=`</div></div></div></div>`;
  document.getElementById('main-content').innerHTML=html;
}
async function togglePeriod(ds){
  const existing=data.periodLogs.find(p=>p.startDate===ds);
  if(existing){
    data.periodLogs=data.periodLogs.filter(p=>p.id!==existing.id);
    renderPeriod();
    await delPeriodLog(existing.id);
  } else {
    const log={id:makeId(),startDate:ds};
    data.periodLogs.push(log);
    data.periodLogs.sort((a,b)=>b.startDate.localeCompare(a.startDate));
    renderPeriod();
    await savePeriodLog(log);
  }
}
async function delPeriodEntry(id){data.periodLogs=data.periodLogs.filter(p=>p.id!==id);renderPeriod();await delPeriodLog(id);}

  for(let mo=0;mo<12;mo++){
    html+=`<div class="card" style="padding:10px"><div style="font-size:12px;font-weight:500;margin-bottom:7px">${MONTHS[mo]}</div><div class="year-mini">`;
    ['M','T','W','T','F','S','S'].forEach((d,i)=>html+=`<div class="year-dow" style="${i===5?'color:var(--accent)':i===6?'color:var(--red)':''}">${d}</div>`);
    const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
    const offset=(first.getDay()||7)-1;
    for(let i=0;i<offset;i++)html+=`<div class="year-day other"></div>`;
    for(let d=1;d<=last.getDate();d++){
      const ds=ym(yr,mo,d),isT=ds===todayStr();
      const dow=new Date(yr,mo,d).getDay(),di=dow===0?6:dow-1;
      const holiday=isHol(ds);
      // 여행 기간 체크
      const inTravel=data.travels.find(t=>t.startDate<=ds&&t.endDate>=ds);
      let style='';
      if(inTravel&&!isT)style=`background:${evBg(inTravel.color)};color:${evTxt(inTravel.color)};border-radius:3px;`;
      const cls='year-day'+(isT?' today':holiday&&!isT?' sun':di===5&&!isT?' sat':di===6&&!isT?' sun':'');
      html+=`<div class="${cls}" style="${style}" title="${inTravel?inTravel.name:''}">${d}</div>`;
    }
    html+=`</div></div>`;
  }
  html+=`</div>`;

  // 해당 연도 여행 목록
  html+=`<div class="card" style="overflow:hidden">
    <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between">
      ${yr}년 여행 <span style="font-size:11px;color:var(--text3);font-weight:400">${yearTravels.length}건</span>
    </div>`;
  if(yearTravels.length===0){
    html+=`<div class="empty">여행 기록이 없어요 ✈️</div>`;
  } else {
    yearTravels.forEach(t=>{
      const start=parseDate(t.startDate),end=parseDate(t.endDate);
      const nights=Math.round((end-start)/(1000*60*60*24));
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer" onclick="openTravelModal('${t.id}')">
        <div style="width:10px;height:10px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500">${escH(t.name)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">
            ${t.destination?`📍${escH(t.destination)} · `:''}${t.startDate} ~ ${t.endDate} (${nights}박${nights+1}일)
          </div>
          ${t.memo?`<div style="font-size:11px;color:var(--text2);margin-top:2px">${escH(t.memo)}</div>`:''}
        </div>
        <div style="font-size:20px">✈️</div>
      </div>`;
    });
  }
  html+=`</div>`;
  document.getElementById('main-content').innerHTML=html;
}

async function saveTravel(){
  const name=document.getElementById('travel-name').value.trim();
  const dest=document.getElementById('travel-dest').value.trim();
  const startDate=document.getElementById('travel-start').value;
  const endDate=document.getElementById('travel-end').value;

  if(startDate>endDate){alert('종료일이 시작일보다 빠릅니다.');return;}
  if(_editTravelId){

    if(t){Object.assign(t,{name,destination:dest,startDate,endDate,color:_travelColor,memo});}
  } else {
    data.travels.push({id:makeId(),name,destination:dest,startDate,endDate,color:_travelColor,memo});

  if(!_editTravelId)return;
  data.travels=data.travels.filter(t=>t.id!==_editTravelId);
  closeTravelModal();renderTravel();
  try{localStorage.setItem('travels_'+currentUser.id,JSON.stringify(data.travels));}catch(e){}
}
function loadTravelsLocal(){
  if(!currentUser)return;
  try{
    const saved=localStorage.getItem('travels_'+currentUser.id);
    if(saved)data.travels=JSON.parse(saved);
  }catch(e){}
}

async function saveItem(){
  const title=document.getElementById('m-title').value.trim();
  if(!title){document.getElementById('m-title').focus();return;}
  const date=document.getElementById('m-date').value;
  if(_mType==='timed'){
    const catId=document.getElementById('m-category').value;
    const time=document.getElementById('m-time').value;
    const te={id:_mMode==='add'?makeId():_mId,title,date,time,categoryId:catId};
    if(_mMode==='add'){data.timedEvents.push(te);closeModal();renderAll();const err=await saveTimedEvent(te);if(err){data.timedEvents=data.timedEvents.filter(t=>t.id!==te.id);renderAll();alert('Error: '+err);}}
    else{const i=data.timedEvents.findIndex(t=>t.id===_mId);const old=data.timedEvents[i];if(i>=0)data.timedEvents[i]=te;closeModal();renderAll();const err=await saveTimedEvent(te);if(err){if(i>=0)data.timedEvents[i]=old;renderAll();alert('Error: '+err);}}
  } else if(_mType==='proj'){
    const pid=document.getElementById('m-project').value;
    const start=document.getElementById('m-time').value;
    const note=document.getElementById('m-note').value;
    const ev={id:_mMode==='add'?makeId():_mId,title,date,start,projectId:pid,color:_mColor,note};
    if(_mMode==='add'){data.projEvents.push(ev);closeModal();renderAll();const err=await saveProjEvent(ev);if(err){data.projEvents=data.projEvents.filter(e=>e.id!==ev.id);renderAll();alert('Error: '+err);}}
    else{const i=data.projEvents.findIndex(e=>e.id===_mId);const old=data.projEvents[i];if(i>=0)data.projEvents[i]=ev;data.tasks.forEach(t=>{if(t.eventId===_mId){t.date=date;saveTask(t);}});closeModal();renderAll();const err=await saveProjEvent(ev);if(err){if(i>=0)data.projEvents[i]=old;renderAll();alert('Error: '+err);}}
  } else {// task
    const pid=document.getElementById('m-project').value;
    const td={id:_mMode==='add'?makeId():_mId,title,date,projectId:pid,done:false,eventId:''};
    if(_mMode==='add'){data.tasks.push(td);closeModal();renderAll();const err=await saveTask(td);if(err){data.tasks=data.tasks.filter(t=>t.id!==td.id);renderAll();alert('Error: '+err);}}
    else{const i=data.tasks.findIndex(t=>t.id===_mId);const oldTd=i>=0?{...data.tasks[i]}:null;if(i>=0)data.tasks[i]=td;closeModal();renderAll();const err=await saveTask(td);if(err){if(i>=0&&oldTd)data.tasks[i]=oldTd;renderAll();alert('Error: '+err);}}
  }
}

async function deleteItem(){
  if(!_mId)return;
  if(_mType==='timed'){
    const backup=data.timedEvents.find(t=>t.id===_mId);
    data.timedEvents=data.timedEvents.filter(t=>t.id!==_mId);closeModal();renderAll();
    await delTimedEvent(_mId,backup);
  } else if(_mType==='proj'){
    const backup=data.projEvents.find(e=>e.id===_mId);
    const subBackup=data.tasks.filter(t=>t.eventId===_mId);
    data.tasks=data.tasks.filter(t=>t.eventId!==_mId);
    data.projEvents=data.projEvents.filter(e=>e.id!==_mId);closeModal();renderAll();
    await delProjEvent(_mId,backup,subBackup);
  } else {
    const backup=data.tasks.find(t=>t.id===_mId);
    data.tasks=data.tasks.filter(t=>t.id!==_mId);closeModal();renderAll();
    const{error}=await sb.from('todos').delete().eq('id',_mId).eq('user_id',currentUser.id);
    if(error){if(backup)data.tasks.push(backup);renderAll();alert('Delete failed');}
  }
}

async function toggleTask(id,checked){
  const td=data.tasks.find(t=>t.id===id);if(!td)return;
  const prev=td.done;
  td.done=checked;renderAll();
  if(document.getElementById('todo-panel').style.display!=='none')renderTodoPanel();
  const err=await saveTask(td);
  if(err){td.done=prev;renderAll();alert('Save error: '+err);}
}
async function deleteTask(id){
  const removed=data.tasks.filter(t=>t.id===id);
  data.tasks=data.tasks.filter(t=>t.id!==id);renderAll();
  if(document.getElementById('todo-panel').style.display!=='none')renderTodoPanel();
  setSyncing();
  const{error}=await sb.from('todos').delete().eq('id',id).eq('user_id',currentUser.id);
  if(error){data.tasks.push(...removed);renderAll();setSyncErr('Delete Error');alert('Delete failed');}
  else setSynced();
}

function closeTodoPanel(){document.getElementById('todo-panel').style.display='none';}
function toggleHideDone(){_hideDone=!_hideDone;document.getElementById('hide-done-btn').textContent=_hideDone?'Show Done':'Hide Done';renderTodoPanel();}
function renderTodoPanel(){
  // 독립 태스크
  let indep=data.tasks.filter(t=>!t.eventId);
  if(_hideDone)indep=indep.filter(t=>!t.done);

  let h='';
  if(indep.length===0&&data.projEvents.length===0){h=`<div class="empty">No tasks</div>`;}

  // 프로젝트 이벤트별 세부항목
  const eventsWithSubs=data.projEvents.filter(ev=>data.tasks.some(t=>t.eventId===ev.id));
  eventsWithSubs.forEach(ev=>{
    const subs=data.tasks.filter(t=>t.eventId===ev.id);
    const filtered=_hideDone?subs.filter(t=>!t.done):subs;
    if(filtered.length===0)return;
    const p=proj(ev.projectId),c=p.color||'#4472C4';
    h+=`<div style="padding:5px 14px 2px;font-size:11px;font-weight:600;color:${c};display:flex;align-items:center;gap:5px;cursor:pointer" onclick="openEditItem('proj','${ev.id}')">
      <span style="width:6px;height:6px;border-radius:50%;background:${c};display:inline-block"></span>${escH(ev.title)}
      <span style="font-size:10px;color:var(--text3);font-weight:400">${ev.date}</span>
    </div>`;
    filtered.forEach(td=>{
      h+=`<div class="todo-item" style="padding-left:26px">
        <input type="checkbox" class="todo-cb" ${td.done?'checked':''} onchange="toggleTask('${td.id}',this.checked)">
        <span class="todo-txt${td.done?' done':''}" style="flex:1">${escH(td.title)}</span>
        <button class="todo-del" onclick="deleteTask('${td.id}')">✕</button>
      </div>`;
    });
  });

  // 독립 태스크 (프로젝트별 그룹)
  if(indep.length>0){
    if(eventsWithSubs.length>0)h+=`<div style="height:1px;background:var(--border);margin:6px 0"></div>`;
    const byProj={};
    indep.forEach(td=>{const pid=td.projectId||'_none';if(!byProj[pid])byProj[pid]=[];byProj[pid].push(td);});
    Object.entries(byProj).forEach(([pid,ptds])=>{
      const p=pid==='_none'?{name:'No Project',color:'var(--text3)'}:proj(pid);
      h+=`<div style="padding:5px 14px 2px;font-size:11px;font-weight:600;color:${p.color};letter-spacing:.5px">${p.name}</div>`;
      ptds.forEach(td=>{h+=`<div class="todo-item"><input type="checkbox" class="todo-cb" ${td.done?'checked':''} onchange="toggleTask('${td.id}',this.checked)"><span class="todo-txt${td.done?' done':''}" style="flex:1">${escH(td.title)}</span><button class="todo-del" onclick="deleteTask('${td.id}')">✕</button></div>`;});
    });
  }

  document.getElementById('todo-panel-body').innerHTML=h||`<div class="empty">No tasks</div>`;
}
async function addPanelTodo(){
  const inp=document.getElementById('tp-inp');
  const title=inp.value.trim();if(!title)return;

  const [selType,selId]=selVal.includes(':')?selVal.split(':'):['proj',selVal];
  const pid=selType==='proj'?selId:'';
  const catId=selType==='timed'?selId:'';
