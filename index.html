let _newProjColor=PALETTE[0];
function openProjModal(){renderProjEdit();document.getElementById('proj-modal').style.display='flex';pushUiState('proj-modal');}
function closeProjModal(){document.getElementById('proj-modal').style.display='none';}
function renderProjEdit(){
  const projs=orderedProjects();
  let h='';
  projs.forEach((p,i)=>{
    h+=`<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)">
      <span style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0"></span>
      <input type="text" value="${escH(p.name)}" style="flex:1;padding:4px 7px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:var(--font)" onblur="renameProj('${p.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      <button onclick="moveProjUp('${p.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px 4px" ${i===0?'disabled opacity:.3':''}>▲</button>
      <button onclick="moveProjDown('${p.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px 4px" ${i===projs.length-1?'disabled opacity:.3':''}>▼</button>
      <button onclick="deleteProj('${p.id}')" class="todo-del" style="font-size:12px">✕</button>
    </div>`;
  });
  document.getElementById('proj-list-edit').innerHTML=h||`<div style="font-size:12px;color:var(--text3);padding:8px 0">No projects</div>`;
  // Colors
  let ch='';PALETTE.forEach(c=>ch+=`<div class="color-sw${c===_newProjColor?' selected':''}" style="background:${c}" onclick="_newProjColor='${c}';renderProjEdit()"></div>`);
  document.getElementById('new-proj-colors').innerHTML=ch;
}
async function renameProj(id,name){
  const p=data.projects.find(x=>x.id===id);if(!p||p.name===name)return;
  p.name=name;renderSidebar();await saveProj(p);
}
function moveProjUp(id){
  const order=orderedProjects().map(p=>p.id);
  const i=order.indexOf(id);if(i<=0)return;
  [order[i-1],order[i]]=[order[i],order[i-1]];
  data.projOrder=order;renderProjEdit();renderSidebar();
}
function moveProjDown(id){
  const order=orderedProjects().map(p=>p.id);
  const i=order.indexOf(id);if(i>=order.length-1)return;
  [order[i],order[i+1]]=[order[i+1],order[i]];
  data.projOrder=order;renderProjEdit();renderSidebar();
}
async function addProject(){
  const emoji=document.getElementById('new-proj-emoji').value.trim();
  const name=document.getElementById('new-proj-name').value.trim();
  if(!name)return;
  const fullName=emoji?emoji+' '+name:name;
  const p={id:makeId(),name:fullName,color:_newProjColor};
  data.projects.push(p);
  document.getElementById('new-proj-name').value='';document.getElementById('new-proj-emoji').value='';
  renderProjEdit();renderSidebar();renderAll();await saveProj(p);
}
async function deleteProj(id){
  if(!confirm('Delete this project?'))return;
  data.projEvents.forEach(e=>{if(e.projectId===id)e.projectId='';});
  data.projects=data.projects.filter(p=>p.id!==id);
  if(state.projFilter===id)state.projFilter=null;
  data.projOrder=data.projOrder.filter(x=>x!==id);
  renderProjEdit();renderSidebar();renderAll();await delProj(id);
}

// ── Anniversaries ─────────────────────────────────────────
function openAnnivModal(){renderAnnivList();document.getElementById('anniv-modal').style.display='flex';pushUiState('anniv-modal');}
function closeAnnivModal(){document.getElementById('anniv-modal').style.display='none';}
function openAddAnniv(){document.getElementById('anniv-add-form').style.display='';document.getElementById('anniv-name').focus();}
function closeAddAnniv(){document.getElementById('anniv-add-form').style.display='none';}
function renderAnnivList(){
  let h='';
  if(data.anniversaries.length===0){h=`<div class="empty">No anniversaries</div>`;}
  else data.anniversaries.forEach(a=>{
    const ds=a.repeatYearly?`${a.month}월 ${a.day}일 (매년)`:`${a.year||''}년 ${a.month}월 ${a.day}일`;
    h+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:16px">${a.emoji||'🎉'}</span>
      <div style="flex:1"><div style="font-size:13px;font-weight:500">${escH(a.name)}</div><div style="font-size:11px;color:var(--text3)">${ds}</div></div>
      <button onclick="deleteAnniv('${a.id}')" class="todo-del" style="font-size:12px">✕</button>
    </div>`;
  });
  document.getElementById('anniv-list').innerHTML=h;
}
async function saveAnniv(){
  if(!currentUser)return;
  const emoji=document.getElementById('anniv-emoji').value.trim()||'🎉';
  const name=document.getElementById('anniv-name').value.trim();
  const month=parseInt(document.getElementById('anniv-month').value);
  const day=parseInt(document.getElementById('anniv-day').value);
  const year=parseInt(document.getElementById('anniv-year').value)||null;
  const repeatYearly=document.getElementById('anniv-repeat').checked;
  if(!name||!month||!day){alert('이름, 월, 일을 입력해주세요.');return;}
  const a={id:makeId(),name,emoji,month,day,year,repeatYearly};
  data.anniversaries.push(a);
  closeAddAnniv();renderAnnivList();renderAll();
  ['anniv-name','anniv-emoji','anniv-month','anniv-day','anniv-year'].forEach(id=>document.getElementById(id).value='');
  const{error}=await sb.from('anniversaries').insert({id:a.id,user_id:currentUser.id,name,emoji,month,day,year:year||null,repeat_yearly:repeatYearly});
  if(error)alert('Error: '+error.message);
}
async function deleteAnniv(id){
  data.anniversaries=data.anniversaries.filter(a=>a.id!==id);
  renderAnnivList();renderAll();
  await sb.from('anniversaries').delete().eq('id',id).eq('user_id',currentUser.id);
}

// ── Timed Categories ──────────────────────────────────────
let _tcColor=PALETTE[0];
function openTimedCatModal(){renderTcList();renderTcColors();document.getElementById('timed-cat-modal').style.display='flex';pushUiState('timed-cat-modal');}
function closeTimedCatModal(){document.getElementById('timed-cat-modal').style.display='none';}
function renderTcColors(){let h='';PALETTE.forEach(c=>h+=`<div class="color-sw${c===_tcColor?' selected':''}" style="background:${c}" onclick="_tcColor='${c}';renderTcColors()"></div>`);document.getElementById('tc-colors').innerHTML=h;}
function renderTcList(){
  let h='';
  if(data.timedCats.length===0){h=`<div class="empty">No categories</div>`;}
  else data.timedCats.forEach((c,i)=>{
    const cnt=data.timedEvents.filter(t=>t.categoryId===c.id).length;
    h+=`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)">
      <span style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0"></span>
      <span style="font-size:14px;flex-shrink:0">${c.emoji||''}</span>
      <input type="text" value="${escH(c.name)}" style="flex:1;padding:3px 7px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:12px;background:var(--bg);color:var(--text);outline:none;font-family:var(--font)"
        onblur="renameTimedCat('${c.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      <span style="font-size:10px;color:var(--text3)">${cnt}</span>
      <button onclick="moveTimedCatUp('${c.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:1px 3px" ${i===0?'disabled':''}">▲</button>
      <button onclick="moveTimedCatDown('${c.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:1px 3px" ${i===data.timedCats.length-1?'disabled':''}">▼</button>
      <button onclick="deleteTimedCat('${c.id}')" class="todo-del" style="font-size:11px">✕</button>
    </div>`;
  });
  document.getElementById('tc-list').innerHTML=h;
}
async function renameTimedCat(id,name){
  const c=data.timedCats.find(x=>x.id===id);if(!c||c.name===name)return;
  c.name=name;renderSidebar();
  await sb.from('timed_categories').update({name}).eq('id',id).eq('user_id',currentUser.id);
}
function moveTimedCatUp(id){
  const i=data.timedCats.findIndex(c=>c.id===id);if(i<=0)return;
  [data.timedCats[i-1],data.timedCats[i]]=[data.timedCats[i],data.timedCats[i-1]];
  renderTcList();renderSidebar();
}
function moveTimedCatDown(id){
  const i=data.timedCats.findIndex(c=>c.id===id);if(i>=data.timedCats.length-1)return;
  [data.timedCats[i],data.timedCats[i+1]]=[data.timedCats[i+1],data.timedCats[i]];
  renderTcList();renderSidebar();
}
async function addTimedCat(){
  if(!currentUser)return;
  const emoji=document.getElementById('tc-emoji').value.trim();
  const name=document.getElementById('tc-name').value.trim();
  if(!name){alert('이름을 입력해주세요.');return;}
  const c={id:makeId(),name,color:_tcColor,emoji};
  data.timedCats.push(c);renderTcList();renderAll();
  document.getElementById('tc-name').value='';document.getElementById('tc-emoji').value='';
  await sb.from('timed_categories').insert({id:c.id,user_id:currentUser.id,name,color:_tcColor,emoji});
}
async function deleteTimedCat(id){
  data.timedCats=data.timedCats.filter(c=>c.id!==id);renderTcList();renderAll();
  await sb.from('timed_categories').delete().eq('id',id).eq('user_id',currentUser.id);
}

// ── Cell Color ────────────────────────────────────────────
function openCellColorPicker(ds,evt){
  document.getElementById('cell-color-picker-el')?.remove();
  const cur=data.cellColors[ds]||'';
  let h=`<div id="cell-color-picker-el" class="cell-color-picker" onclick="event.stopPropagation()">
    <div style="font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:600">Cell Color</div>
    <div class="color-row" style="margin-bottom:6px">`;
  PALETTE.forEach(c=>h+=`<div class="color-sw${c===cur?' selected':''}" style="background:${c}" onclick="setCellColor('${ds}','${c}')"></div>`);
  h+=`</div><button onclick="setCellColor('${ds}','')" class="btn-cancel" style="width:100%;font-size:11px;padding:3px">Clear</button></div>`;
  document.body.insertAdjacentHTML('beforeend',h);
  const el=document.getElementById('cell-color-picker-el');
  el.style.left=Math.min(evt.pageX,window.innerWidth-180)+'px';
  el.style.top=Math.min(evt.pageY,window.innerHeight-200)+'px';
  setTimeout(()=>document.addEventListener('click',closeCellColorPicker,{once:true}),10);
}
async function setCellColor(ds,color){
  if(color)data.cellColors[ds]=color;else delete data.cellColors[ds];
  document.getElementById('cell-color-picker-el')?.remove();
  renderAll();await saveCellColor(ds,color);
}
function closeCellColorPicker(){document.getElementById('cell-color-picker-el')?.remove();}

// ── School Schedule ───────────────────────────────────────
async function addSchoolSchedule(){
  if(!currentUser){alert('Login required.');return;}
  const classes=[{name:'패션디자인연구(4)',color:'#4472C4',day:2,start:'14:00'},{name:'회화론',color:'#70AD47',day:2,start:'18:00'},{name:'디자인미학',color:'#7030A0',day:4,start:'10:00'}];
  const titles=classes.map(c=>c.name);
  const existing=data.projEvents.filter(e=>titles.includes(e.title));
  if(existing.length>0){if(!confirm(`기존 수업 일정 ${existing.length}개를 삭제하고 새로 추가할까요?`))return;
    const ids=existing.map(e=>e.id);data.projEvents=data.projEvents.filter(e=>!ids.includes(e.id));await sb.from('events').delete().in('id',ids).eq('user_id',currentUser.id);
    const ep=data.projects.filter(p=>titles.includes(p.name));const epIds=ep.map(p=>p.id);data.projects=data.projects.filter(p=>!epIds.includes(p.id));if(epIds.length>0)await sb.from('projects').delete().in('id',epIds).eq('user_id',currentUser.id);}
  setSyncing();
  const pRows=[];
  for(const cp of classes){cp.id=makeId();data.projects.push({id:cp.id,name:cp.name,color:cp.color});pRows.push({id:cp.id,user_id:currentUser.id,name:cp.name,color:cp.color});}
  await sb.from('projects').insert(pRows);
  let start=new Date(2026,2,1);while(start.getDay()!==2)start.setDate(start.getDate()+1);
  const evs=[];
  for(let w=0;w<15;w++)for(const cp of classes){const d=new Date(start);d.setDate(d.getDate()+w*7+(cp.day-2));evs.push({id:makeId(),title:cp.name,date:fmtDate(d),start:cp.start,projectId:cp.id,color:'',note:''});}
  data.projEvents.push(...evs);renderAll();
  const{error}=await sb.from('events').insert(evs.map(ev=>({id:ev.id,user_id:currentUser.id,title:ev.title,date:ev.date,start:ev.start,end:null,project_id:ev.projectId,color:null,note:null})));
  if(error){setSyncErr('Error');alert(error.message);}else{setSynced();alert(`✓ 완료! 프로젝트 3개 + 일정 ${evs.length}개`);}
}

// ── Backup ────────────────────────────────────────────────
async function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.projects&&!d.projEvents)throw new Error('Invalid backup file');
      if(!confirm(`Restore backup?\n• ${(d.projects||[]).length} projects\n• ${(d.projEvents||[]).length} events\n• ${(d.tasks||[]).length} tasks\n\nThis will replace all current data.`))return;
      setSyncing();
      const uid=currentUser.id;
      await Promise.all([
        sb.from('events').delete().eq('user_id',uid),
        sb.from('todos').delete().eq('user_id',uid),
        sb.from('projects').delete().eq('user_id',uid),
        sb.from('timed_events').delete().eq('user_id',uid),
        sb.from('timed_categories').delete().eq('user_id',uid),
        sb.from('anniversaries').delete().eq('user_id',uid),
        sb.from('period_logs').delete().eq('user_id',uid),
        sb.from('golf').delete().eq('user_id',uid),
        sb.from('office').delete().eq('user_id',uid),
        sb.from('cell_colors').delete().eq('user_id',uid),
      ]);
      if((d.projects||[]).length)await sb.from('projects').insert(d.projects.map(p=>({id:p.id,user_id:uid,name:p.name,color:p.color})));
      if((d.projEvents||[]).length)await sb.from('events').insert(d.projEvents.map(ev=>({id:ev.id,user_id:uid,title:ev.title,date:ev.date,start:ev.start||null,end:null,project_id:ev.projectId||null,color:ev.color||null,note:ev.note||null})));
      if((d.tasks||[]).length)await sb.from('todos').insert(d.tasks.map(td=>({id:td.id,user_id:uid,title:td.title,date:td.date||null,project_id:td.projectId||null,done:td.done,event_id:td.eventId||null})));
      if((d.timedCats||[]).length)await sb.from('timed_categories').insert(d.timedCats.map(c=>({id:c.id,user_id:uid,name:c.name,color:c.color,emoji:c.emoji||''})));
      if((d.timedEvents||[]).length)await sb.from('timed_events').insert(d.timedEvents.map(t=>({id:t.id,user_id:uid,title:t.title,date:t.date,time:t.time,category_id:t.categoryId||null})));
      if((d.anniversaries||[]).length)await sb.from('anniversaries').insert(d.anniversaries.map(a=>({id:a.id,user_id:uid,name:a.name,emoji:a.emoji,month:a.month,day:a.day,year:a.year||null,repeat_yearly:a.repeatYearly})));
      if((d.periodLogs||[]).length)await sb.from('period_logs').insert(d.periodLogs.map(p=>({id:p.id,user_id:uid,start_date:p.startDate})));
      for(const[ds,rec]of Object.entries(d.golf||{}))await saveGolfRec(ds,rec);
      for(const[ds,rec]of Object.entries(d.office||{}))await saveOfficeRec(ds,rec);
      for(const[ds,c]of Object.entries(d.cellColors||{}))await saveCellColor(ds,c);
      if(d.homeNote)await saveHomeNote(d.homeNote);
      await loadAll();
      document.getElementById('backup-status').textContent='Restored ✓';
      setTimeout(()=>document.getElementById('backup-status').textContent='',3000);
    }catch(err){setSyncErr('Restore failed');alert(err.message);}
    e.target.value='';
  };
  reader.readAsText(file);
}
function exportData(){
  const obj={projects:data.projects,timedCats:data.timedCats,timedEvents:data.timedEvents,projEvents:data.projEvents,tasks:data.tasks,golf:data.golf,office:data.office,cellColors:data.cellColors,anniversaries:data.anniversaries,periodLogs:data.periodLogs,homeNote:data.homeNote,classMemos:data.classMemos,projOrder:data.projOrder,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jinhae_schedule_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);
}

// ── History & Mobile ──────────────────────────────────────
function setupHistory(){
  if(!history.state||!history.state.app){
    history.replaceState({app:true},'',window.location.href);
  }
}
function pushUiState(type){
  history.pushState({app:true,ui:type},'',window.location.href);
}
window.addEventListener('popstate',()=>{
  const modals=['modal','todo-panel','proj-modal','anniv-modal','timed-cat-modal','golf-modal','studio-modal','travel-modal'];
  for(const id of modals){
    const el=document.getElementById(id);
    if(el&&el.style.display!=='none'){el.style.display='none';return;}
  }
  const sb=document.getElementById('sidebar');
  if(sb&&sb.classList.contains('open')){closeSb();return;}
  if(state.view==='day'){setView('month');return;}
});
let _tx=0,_ty=0;
document.addEventListener('wheel',e=>{if(e.target.closest('.modal-overlay,.sidebar,.work-time-inp,input,textarea,select'))return;clearTimeout(window._wt);window._wt=setTimeout(()=>navigate(e.deltaY>0?1:-1),80);},{passive:true});
document.addEventListener('touchstart',e=>{if(e.target.closest('.modal-overlay,.sidebar,input,textarea,select,[data-h]'))return;_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{if(e.target.closest('.modal-overlay,.sidebar,input,textarea,select,[data-h]'))return;const dx=e.changedTouches[0].clientX-_tx,dy=e.changedTouches[0].clientY-_ty;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5)navigate(dx<0?1:-1);},{passive:true});

// ── Init ──────────────────────────────────────────────────
(async()=>{const{data:{session}}=await sb.auth.getSession();if(session?.user)await showApp(session.user);else showLogin();})();
sb.auth.onAuthStateChange(async(event,session)=>{if(event==='SIGNED_IN'&&session?.user&&!currentUser)await showApp(session.user);else if(event==='SIGNED_OUT')showLogin();});
</script>
