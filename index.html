<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JINHAE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3"></script>
<style>
:root {
  --bg: #F7F6F3; --surface: #FFFFFF; --surface2: #F0EEE9;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
  --text: #1A1917; --text2: #6B6860; --text3: #A8A59E;
  --accent: #2D6BE4; --accent-bg: #EEF3FC; --accent-text: #1A4BA8;
  --green: #1D9E75; --green-bg: #E8F7F2; --green-text: #0D6B4F;
  --red: #C0392B; --red-bg: #FDECEA;
  --radius: 10px; --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

/* Login screen */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.login-box {
  background: var(--surface); border-radius: 16px; padding: 48px 40px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12); text-align: center; width: 340px;
}
.login-logo { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.login-logo span { color: var(--accent); }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 32px; }
.login-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 12px 20px; border-radius: var(--radius);
  border: 1px solid var(--border2); background: var(--surface);
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 500; color: var(--text);
  transition: background 0.15s, box-shadow 0.15s;
}
.login-btn:hover { background: var(--surface2); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.login-btn img { width: 20px; height: 20px; }
.login-loading { font-size: 13px; color: var(--text3); margin-top: 16px; }

/* Sync indicator */
#sync-status {
  position: fixed; bottom: 16px; right: 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 12px; font-size: 11px; color: var(--text3);
  box-shadow: var(--shadow); z-index: 100; transition: opacity 0.3s;
  display: flex; align-items: center; gap: 6px;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.sync-dot.syncing { background: #BA7517; animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.shell { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 230px; min-width: 230px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; overflow-y: auto; }
.sidebar-logo { padding: 0 20px 16px; font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.sidebar-logo span { color: var(--accent); }
.sidebar-user { padding: 0 20px 12px; display: flex; align-items: center; gap: 8px; }
.sidebar-user-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; font-weight: 600; flex-shrink: 0; overflow: hidden; }
.sidebar-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.sidebar-user-name { font-size: 12px; color: var(--text2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-logout { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 3px; }
.sidebar-logout:hover { background: var(--surface2); color: var(--red); }
.nav-section { padding: 0 12px; margin-bottom: 6px; }
.nav-label { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; padding: 0 8px; margin-bottom: 3px; display: flex; align-items: center; justify-content: space-between; }
.nav-label-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 0 2px; line-height: 1; border-radius: 3px; }
.nav-label-btn:hover { background: var(--surface2); color: var(--text2); }
.nav-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 10px; border: none; background: none; cursor: pointer; border-radius: var(--radius-sm); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text2); text-align: left; transition: background 0.15s, color 0.15s; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
.nav-icon { font-size: 13px; width: 16px; text-align: center; flex-shrink: 0; }
.proj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.proj-nav-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 6px 10px; border: none; background: none; cursor: pointer; border-radius: var(--radius-sm); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text2); text-align: left; transition: background 0.15s; }
.proj-nav-btn:hover { background: var(--surface2); color: var(--text); }
.proj-nav-btn.active { background: var(--surface2); color: var(--text); font-weight: 500; }
.proj-count { margin-left: auto; font-size: 10px; color: var(--text3); background: var(--surface2); border-radius: 8px; padding: 1px 6px; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.content { flex: 1; overflow-y: auto; padding: 20px; min-height: 0; }
.tb-nav { display: flex; gap: 2px; }
.tb-nav-btn { padding: 5px 11px; border-radius: var(--radius-sm); border: none; background: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text2); transition: background 0.12s; }
.tb-nav-btn:hover { background: var(--surface2); color: var(--text); }
.tb-nav-btn.active { background: var(--accent); color: white; }
.tb-title { font-size: 14px; font-weight: 500; flex: 1; text-align: center; }
.tb-btn { padding: 6px 13px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text); transition: background 0.12s; }
.tb-btn:hover { background: var(--surface2); }
.tb-btn.primary { background: var(--accent); color: white; border-color: transparent; }
.tb-btn.primary:hover { background: #1A4BA8; }
.tb-arr { padding: 5px 8px; }
.filter-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 6px 20px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
.filter-chip { padding: 3px 10px; border-radius: 20px; border: 1.5px solid transparent; font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; transition: opacity 0.15s; background: var(--surface2); color: var(--text2); }
.filter-chip:hover { opacity: 0.8; }
.filter-chip.active-chip { color: white; }
.filter-label { font-size: 11px; color: var(--text3); margin-right: 2px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
.day-view { display: grid; grid-template-columns: 1fr 260px; gap: 16px; }
.time-row { display: flex; align-items: flex-start; min-height: 48px; border-top: 1px solid var(--border); }
.time-label { width: 46px; font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; padding: 4px 6px 0 0; flex-shrink: 0; text-align: right; }
.time-slot { flex: 1; min-height: 48px; cursor: pointer; }
.time-slot:hover { background: var(--accent-bg); }
.ev-block { border-radius: var(--radius-sm); padding: 3px 8px; margin: 2px 4px; font-size: 12px; font-weight: 500; cursor: pointer; }
.ev-block:hover { opacity: 0.85; }
.week-header { display: grid; grid-template-columns: 46px repeat(7, 1fr); }
.week-day-head { text-align: center; padding: 8px 4px; font-size: 11px; color: var(--text2); border-bottom: 1px solid var(--border); }
.week-day-head.today-col { color: var(--accent); font-weight: 500; }
.week-grid { display: grid; grid-template-columns: 46px repeat(7, 1fr); }
.week-time-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; padding: 4px 4px 0 0; text-align: right; border-top: 1px solid var(--border); min-height: 38px; }
.week-cell { border-top: 1px solid var(--border); border-left: 1px solid var(--border); min-height: 38px; cursor: pointer; }
.week-cell:hover { background: var(--accent-bg); }
.week-cell.today-col { background: rgba(45,107,228,0.025); }
.week-ev { font-size: 10px; font-weight: 500; padding: 1px 4px; margin: 1px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.month-header-row { display: grid; grid-template-columns: repeat(7, 1fr); }
.month-dow { text-align: center; padding: 7px; font-size: 11px; color: var(--text3); font-weight: 500; border-bottom: 1px solid var(--border); }
.month-dow.sat { color: var(--accent); } .month-dow.sun { color: var(--red); }
.month-view { overflow: visible; }
.month-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.month-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 5px 6px; cursor: pointer; min-height: 90px; transition: background 0.1s; vertical-align: top; }
.month-cell:hover { background: var(--accent-bg); }
.month-cell.other { opacity: 0.35; cursor: default; }
.month-cell.other:hover { background: transparent; }
.month-cell.today { background: rgba(45,107,228,0.04); }
.month-cell.selected { outline: 2px solid var(--accent); outline-offset: -2px; }
.month-cell-num { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 3px; }
.month-ev { font-size: 10px; font-weight: 500; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.year-view { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.year-mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.year-dow { font-size: 8px; text-align: center; color: var(--text3); padding: 1px 0; }
.year-day { font-size: 10px; text-align: center; padding: 2px 0; border-radius: 3px; cursor: pointer; color: var(--text2); }
.year-day:hover { background: var(--surface2); }
.year-day.today { background: var(--accent); color: white; font-weight: 500; }
.year-day.has-ev { font-weight: 600; color: var(--text); }
.year-day.other { color: var(--text3); opacity: 0.4; cursor: default; }
.year-day.sat { color: var(--accent); } .year-day.sun { color: var(--red); }
.year-day.today { color: white !important; }
.todo-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-bottom: 1px solid var(--border); }
.todo-item:last-child { border-bottom: none; }
.todo-item:hover { background: var(--surface2); }
.todo-cb { width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; accent-color: var(--accent); }
.todo-text { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.todo-text.done { text-decoration: line-through; color: var(--text3); }
.todo-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 11px; padding: 2px 4px; border-radius: 3px; opacity: 0; flex-shrink: 0; }
.todo-item:hover .todo-del { opacity: 1; }
.todo-del:hover { background: var(--red-bg); color: var(--red); }
.empty { padding: 24px; text-align: center; color: var(--text3); font-size: 13px; }
.quick-add { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border); }
.quick-add input { flex: 1; padding: 6px 10px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; background: var(--bg); outline: none; }
.quick-add input:focus { border-color: var(--accent); }
.quick-add button { padding: 6px 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 420px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.3px; }
.form-row input, .form-row select, .form-row textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; background: var(--bg); outline: none; color: var(--text); }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
.form-row textarea { min-height: 70px; resize: vertical; }
.form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.color-row { display: flex; gap: 6px; flex-wrap: wrap; }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--text); }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
@media (max-width: 768px) {
  .modal-footer { position: sticky; bottom: 0; background: var(--surface); padding: 12px 0 8px; margin-top: 12px; }
}
.btn-save { padding: 8px 18px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; }
.btn-save:hover { background: #1A4BA8; }
.btn-cancel { padding: 8px 14px; background: none; border: 1px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text2); }
.btn-cancel:hover { background: var(--surface2); }
.btn-del { padding: 8px 14px; background: none; border: 1px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--red); margin-right: auto; }
.btn-del:hover { background: var(--red-bg); }
.work-layout { display: grid; grid-template-columns: 1fr 200px; gap: 16px; align-items: start; }
.work-cal-header { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid var(--border); }
.work-dow { text-align: center; padding: 6px 4px; font-size: 11px; color: var(--text3); font-weight: 500; }
.work-dow.sat { color: var(--accent); } .work-dow.sun { color: var(--red); }
.work-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
.work-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 5px 6px; min-height: 90px; overflow: hidden; box-sizing: border-box; }
.work-cell.empty { background: var(--surface2); opacity: 0.4; }
.work-cell.today .work-cell-num { color: var(--accent); font-weight: 700; }
.work-cell.sat .work-cell-num { color: var(--accent); }
.work-cell.sun .work-cell-num { color: var(--red); }
.work-cell.golf-worked { background: #FEF3DC; }
.work-cell.worked { background: #E0F5FA; }
.work-cell-num { font-size: 11px; color: var(--text2); font-weight: 500; line-height: 1; }
.work-amt-input { width: 100%; border: none; outline: none; background: transparent; font-size: 11px; color: #7A4C0A; font-weight: 600; font-family: 'DM Mono', monospace; text-align: center; padding: 1px 0; cursor: pointer; }
.work-amt-input:focus { background: rgba(186,117,23,0.1); border-radius: 3px; }
.work-amt-input::placeholder { color: var(--text3); font-weight: 400; }
.work-time-input { width: 100%; max-width: 100%; border: none; outline: none; background: transparent; font-size: 9px; color: var(--text2); font-family: 'DM Mono', monospace; padding: 1px 0; cursor: pointer; box-sizing: border-box; }
.work-time-input:focus { background: var(--accent-bg); border-radius: 3px; }
.work-hr-label { font-size: 10px; font-weight: 700; color: #05566B; text-align: center; }
.work-bar-bg { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.work-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
.office-cell { min-height: 64px; }
.golf-round-row { margin-bottom: 4px; }
.golf-hole-btn { padding: 4px 10px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: none; cursor: pointer; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text2); transition: all 0.12s; }
.golf-hole-btn.active { background: #BA7517; color: white; border-color: #BA7517; }
.golf-hole-custom { width: 52px; padding: 4px 6px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 12px; font-family: 'DM Mono', monospace; background: var(--bg); outline: none; color: var(--text); }
.golf-amt-field { width: 100%; padding: 6px 10px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; font-family: 'DM Mono', monospace; background: var(--bg); outline: none; color: var(--text); }
.golf-amt-field:focus { border-color: #BA7517; }
.golf-cell { min-height: 72px; cursor: pointer; }
.golf-cell-empty { font-size: 16px; color: var(--text3); text-align: center; line-height: 1; padding: 6px 0; cursor: pointer; }
.golf-cell-empty:hover { color: #BA7517; }
.golf-wx-btn { font-size: 20px; background: none; border: 2px solid transparent; border-radius: 8px; padding: 2px 4px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.golf-wx-btn:hover { background: var(--surface2); }
.golf-wx-btn.active { border-color: var(--accent); background: var(--accent-bg); }
.golf-cell-add { font-size: 11px; color: var(--text3); text-align: center; cursor: pointer; padding: 1px 0; }
.golf-cell-add:hover { color: #BA7517; }
.golf-round-tag { display: flex; align-items: center; gap: 2px; cursor: pointer; line-height: 1.3; }
.golf-holes { font-size: 9px; font-weight: 700; color: #BA7517; font-family: 'DM Mono', monospace; }
.golf-amt { font-size: 10px; color: #7A4C0A; font-family: 'DM Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.golf-day-total { font-size: 10px; font-weight: 700; color: #BA7517; font-family: 'DM Mono', monospace; margin-top: 1px; }
.cell-color-picker { position:fixed; z-index:2000; background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius); box-shadow:0 8px 24px rgba(0,0,0,0.15); padding:10px; width:150px; }
.cell-color-swatch { width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.1s; }
.cell-color-swatch:hover { transform:scale(1.2); }
.cell-color-swatch.active { border-color: var(--text); }
.cell-color-dot { display:inline-block; width:5px; height:5px; border-radius:50%; margin-left:3px; vertical-align:middle; margin-bottom:1px; }
.todo-view-btn { padding:4px 12px; border:1px solid var(--border2); border-radius:20px; background:none; cursor:pointer; font-size:12px; font-family:'Noto Sans KR',sans-serif; color:var(--text2); transition:all 0.12s; }
.todo-view-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
.todo-filter-btn { padding:3px 10px; border-radius:20px; border:1px solid var(--border2); cursor:pointer; font-size:12px; font-family:'Noto Sans KR',sans-serif; background:none; color:var(--text2); }
.todo-filter-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
.todo-group { border-bottom:1px solid var(--border); }
.todo-group:last-child { border-bottom:none; }
.todo-group-header { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; cursor:pointer; user-select:none; gap:8px; }
.todo-group-header:hover { background:var(--surface2); }
.todo-group-title { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.todo-group-count { font-size:11px; color:var(--text3); flex-shrink:0; font-family:'DM Mono',monospace; }
.todo-group-body { padding:0 14px 6px; }
.todo-proj-badge { font-size:10px; padding:0 5px; border-radius:8px; margin-right:4px; }
.todo-sub-add { padding:4px 0 6px; }
.todo-sub-input { width:100%; border:none; border-bottom:1px solid var(--border); outline:none; font-size:12px; font-family:'Noto Sans KR',sans-serif; color:var(--text2); background:transparent; padding:3px 0; }
.todo-sub-input:focus { border-bottom-color:var(--accent); color:var(--text); }
.subtask-row { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--border); }
.subtask-row:last-child { border-bottom:none; }

async function addSchoolSchedule(){
  if(!currentUser){alert('로그인이 필요합니다.');return;}

  // 수업별 프로젝트 정의 (각 수업마다 고유 프로젝트)
  let classProjects=[
    {name:'패션디자인연구(4)', color:'#4472C4', day:2, start:'14:00', end:'17:00'},
    {name:'회화론',            color:'#70AD47', day:2, start:'18:00', end:'21:00'},
    {name:'디자인미학',        color:'#7030A0', day:4, start:'10:00', end:'13:00'},
  ];

  // 기존 수업 일정 있으면 확인
  let titles=classProjects.map(c=>c.name);
  let existing=data.events.filter(e=>titles.includes(e.title));
  if(existing.length>0){
    if(!confirm(`이미 수업 일정 ${existing.length}개가 있습니다. 기존 수업 일정을 모두 삭제하고 새로 추가할까요?`)) return;
    // 기존 수업 일정 삭제
    let existingIds=existing.map(e=>e.id);
    data.events=data.events.filter(e=>!existingIds.includes(e.id));
    await sb.from('events').delete().in('id', existingIds).eq('user_id', currentUser.id);
    // 기존 수업 프로젝트 삭제
    let existingProjs=data.projects.filter(p=>titles.includes(p.name));
    let existingProjIds=existingProjs.map(p=>p.id);
    data.projects=data.projects.filter(p=>!existingProjIds.includes(p.id));
    if(existingProjIds.length>0)
      await sb.from('projects').delete().in('id', existingProjIds).eq('user_id', currentUser.id);
  }

  setSyncing();

  // 1. 수업별 프로젝트 생성
  let projRows=[];
  for(let cp of classProjects){
    cp.id=makeId();
    let p={id:cp.id, name:cp.name, color:cp.color};
    data.projects.push(p);
    projRows.push({id:cp.id, user_id:currentUser.id, name:cp.name, color:cp.color});
  }
  const {error:pErr}=await sb.from('projects').insert(projRows);
  if(pErr){setSyncError('프로젝트 저장 실패');alert(pErr.message);return;}

  // 2. 3월 첫째주 화요일 찾기 (2026)
  let year=2026;
  let startDate=new Date(year,2,1);
  while(startDate.getDay()!==2) startDate.setDate(startDate.getDate()+1);

  // 3. 15주 일정 생성
  let eventsToAdd=[];
  for(let week=0;week<15;week++){
    for(let cp of classProjects){
      let d=new Date(startDate);
      let offset=cp.day-2; // 화=0, 목=+2
      d.setDate(d.getDate()+(week*7)+offset);
      let ds=fmtDate(d);
      let ev={
        id:makeId(), title:cp.name, date:ds,
        start:cp.start, end:cp.end,
        projectId:cp.id, color:''
      };
      eventsToAdd.push(ev);
    }
  }

  data.events.push(...eventsToAdd);
  renderAll();

  let evRows=eventsToAdd.map(ev=>({
    id:ev.id, user_id:currentUser.id,
    title:ev.title, date:ev.date,
    start:ev.start, end:ev.end,
    project_id:ev.projectId, color:null, note:null
  }));
  const {error:eErr}=await sb.from('events').insert(evRows);
  if(eErr){setSyncError('수업 저장 실패');alert(eErr.message);}
  else{ setSynced(); alert(`✓ 수업 프로젝트 3개 + 일정 ${eventsToAdd.length}개 추가 완료!`); }
}

      sb.from('office').select('*').eq('user_id', uid),
      sb.from('cell_colors').select('*').eq('user_id', uid),
      sb.from('project_memos').select('*').eq('user_id', uid),
      sb.from('anniversaries').select('*').eq('user_id', uid),
      sb.from('timed_events').select('*').eq('user_id', uid),
      sb.from('timed_categories').select('*').eq('user_id', uid),
    ]);

    // Projects
    if (prRes.data && prRes.data.length > 0) {
      data.projects = prRes.data.map(p => ({ id: p.id, name: p.name, color: p.color }));
    } else {
      // Seed default projects for new user
      data.projects = [
        {id:'p1',name:'개인',color:'#2D6BE4'},
        {id:'p2',name:'수업 · 과제',color:'#1D9E75'},
        {id:'p3',name:'박사 논문',color:'#6C4FBF'},
        {id:'p4',name:'HAEGOBJ',color:'#D4537E'},
        {id:'p5',name:'기타',color:'#7C6F5B'},
      ];
      await saveProjectsBatch(data.projects);
    }

    // Events
    data.events = (evRes.data || []).map(e => ({
      id: e.id, title: e.title, date: e.date,
      start: e.start || '', end: e.end || '',
      projectId: e.project_id || '', color: e.color || '', note: e.note || ''
    }));

    // Todos
    data.todos = (tdRes.data || []).map(t => ({
      id: t.id, title: t.title, date: t.date || '',
      projectId: t.project_id || '', done: t.done || false,
      eventId: t.event_id || ''
    }));

    // Golf
    data.golf = {};
    (gRes.data || []).forEach(g => { data.golf[g.date] = { rounds: g.rounds || [], weather: g.weather || '' }; });

    // Office
    data.office = {};
    (oRes.data || []).forEach(o => { data.office[o.date] = { in: o.time_in || '', out: o.time_out || '' }; });

    // Cell Colors
    data.cellColors = {};
    (ccRes.data || []).forEach(c => { data.cellColors[c.date] = c.color; });

    // Project Memos
    data.projectMemos = {};
    (pmRes.data || []).forEach(m => { data.projectMemos[m.project_id] = m.content; });

    // Anniversaries
    data.anniversaries = (anRes.data || []).map(a => ({
      id: a.id, name: a.name, emoji: a.emoji||'🎉',
      month: a.month, day: a.day, year: a.year||null,
      repeatYearly: a.repeat_yearly
    }));

    // Timed Events
    data.timedEvents = (teRes.data || []).map(t => ({
      id: t.id, title: t.title, date: t.date,
      time: t.time, categoryId: t.category_id
    }));

    // Timed Categories
    data.timedCategories = (tcRes.data || []).map(c => ({
      id: c.id, name: c.name, color: c.color||'#4472C4', emoji: c.emoji||''
    }));

    setSynced();
    renderAll();
  } catch(e) {
    setSyncError('로드 오류');
    console.error(e);
  }
}

async function saveProjectsBatch(projects) {
  try {
    const uid = currentUser.id;
    const rows = projects.map(p => ({ id: p.id, user_id: uid, name: p.name, color: p.color }));
    const { error } = await sb.from('projects').upsert(rows);
    if (error) console.error('프로젝트 저장 오류:', error);
  } catch(e) {
    console.error('saveProjectsBatch 오류:', e);
  }
}

async function saveEvent(ev) {

async function deleteEvent(id) {

async function saveGolfRecord(ds, rec) {
  setSyncing();
  let error;
  if (!rec) {
    ({ error } = await sb.from('golf').delete().eq('date', ds).eq('user_id', currentUser.id));
  } else {
    // rec은 {rounds:[], weather:''} 형태
    let rounds = Array.isArray(rec) ? rec : (rec.rounds || []);
    let weather = Array.isArray(rec) ? '' : (rec.weather || '');
    ({ error } = await sb.from('golf').upsert({ user_id: currentUser.id, date: ds, rounds, weather }));

// ── State ──────────────────────────────────────────────────
let today = new Date(); today.setHours(0,0,0,0);
function todayStr() { return fmtDate(today); }
function fmtDate(d) { let y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function parseDate(s) { let p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function ym(yr,mo,d) { return `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function timeDiff(tin,tout) { let [ih,im]=tin.split(':').map(Number),[oh,om]=tout.split(':').map(Number); return (oh*60+om)-(ih*60+im); }

let state = { view:'month', cursor:new Date(today), selected:todayStr(), filterProject:null, filterTimedProj:null };
let modalMode=null, editingId=null, modalType='event', selectedColor='';
let newProjColor = PALETTE[0];
let todoProjFilter = null;
let todoViewMode = 'event';
let hideDone = false;

function proj(id) { return data.projects.find(p=>p.id===id)||{id:'',name:'미지정',color:'#A8A59E'}; }
function evColor(ev) { return ev.color || (proj(ev.projectId).color) || PALETTE[0]; }
function eventsOn(ds) {
  let evs = data.events.filter(e=>e.date===ds).sort((a,b)=>a.start.localeCompare(b.start));
  if (state.filterProject) evs = evs.filter(e=>e.projectId===state.filterProject);
  return evs;
}
function todosOn(ds, excludeLinked=false) {
  let tds = data.todos.filter(t=>t.date===ds);
  if (excludeLinked) tds = tds.filter(t=>!t.eventId);
  if (state.filterProject) tds = tds.filter(t=>t.projectId===state.filterProject);
  return tds;
}

// ── View routing ───────────────────────────────────────────
function setView(v) {
  state.view=v;
  document.querySelectorAll('[data-view]').forEach(el=>el.classList.toggle('active',el.dataset.view===v));
  if(window.innerWidth<=768) closeSidebar();
  renderAll();
}
function navigate(dir) {
  let c=state.cursor;
  if(state.view==='day') c.setDate(c.getDate()+dir);
  
  else if(state.view==='month'||state.view==='golf'||state.view==='studio') c.setMonth(c.getMonth()+dir);
  else c.setFullYear(c.getFullYear()+dir);
  state.cursor=new Date(c); renderAll();
}
function goToday(){state.cursor=new Date(today);state.selected=todayStr();renderAll();}
function selectDay(ds){state.selected=ds;state.cursor=parseDate(ds);renderAll();}
function jumpToDay(ds){state.selected=ds;state.cursor=parseDate(ds);setView('day');}
function setProjectFilter(pid){
  if(state.view==='golf'||state.view==='studio'){
    state.filterProject=pid;
    setView('month');
    return;
  }
  state.filterProject=pid;
  if(window.innerWidth<=768) closeSidebar();
  renderAll();
}

function renderAll() {
  if (!currentUser) return;
  updateTitle(); renderSidebar(); renderFilterBar();
  if(state.view==='day') renderDay();
  else if(state.view==='month') renderMonth();
  else if(state.view==='year') renderYear();
  else if(state.view==='golf') renderGolf();
  else if(state.view==='studio') renderStudio();
}

function updateTitle(){
  let c=state.cursor,s='';
  if(state.view==='day') s=c.getFullYear()+'년 '+(c.getMonth()+1)+'월 '+c.getDate()+'일 ('+['일','월','화','수','목','금','토'][c.getDay()]+')';
  else if(state.view==='month') s=c.getFullYear()+'년 '+(c.getMonth()+1)+'월';
  else if(state.view==='year') s=c.getFullYear()+'년';
  else if(state.view==='golf') s='⛳ 골프장 근무 — '+c.getFullYear()+'년 '+(c.getMonth()+1)+'월';
  else if(state.view==='studio') s='🏢 스튜디오 출근 — '+c.getFullYear()+'년 '+(c.getMonth()+1)+'월';
  document.getElementById('main-title').textContent=s;
}

function renderSidebar(){
  let totalCount=data.events.length+data.todos.filter(t=>!t.eventId).length;
  document.getElementById('proj-all-count').textContent=totalCount;
  document.getElementById('proj-all-btn').className='proj-nav-btn'+(state.filterProject===null?' active':'');
  let html='';
  data.projects.forEach(p=>{
    let cnt=data.events.filter(e=>e.projectId===p.id).length+data.todos.filter(t=>t.projectId===p.id&&!t.eventId).length;
    html+=`<button class="proj-nav-btn${state.filterProject===p.id?' active':''}" onclick="setProjectFilter('${p.id}')">
      <span class="proj-dot" style="background:${p.color};"></span>
      <span>${p.name}</span>
      <span class="proj-count">${cnt}</span>
    </button>`;
  });
  document.getElementById('proj-nav-list').innerHTML=html;

  // Timed Events 카테고리 목록
  let teAllBtn=document.getElementById('te-all-btn');
  if(teAllBtn){
    teAllBtn.className='proj-nav-btn'+(state.filterTimedProj===null?' active':'');
    document.getElementById('te-all-count').textContent=data.timedEvents.length;
    let teHtml='';
    data.timedCategories.forEach(c=>{
      let cnt=data.timedEvents.filter(t=>t.categoryId===c.id).length;
      teHtml+=`<button class="proj-nav-btn${state.filterTimedProj===c.id?' active':''}" onclick="setTimedFilter('${c.id}')">
        <span class="proj-dot" style="background:${c.color};"></span>
        <span>${c.emoji?c.emoji+' ':''}${c.name}</span>
        <span class="proj-count">${cnt}</span>

  }

function renderFilterBar(){
  let bar=document.getElementById('filter-bar');
  if(!state.filterProject){bar.style.display='none';return;}

}

// ── Day view ───────────────────────────────────────────────
// 시간블록 저장 (in-memory, session)
if(!window.dayBlocks) window.dayBlocks={};

function renderDay(){
  let ds=fmtDate(state.cursor),evs=eventsOn(ds),allTds=todosOn(ds);
  let dayHol=holidayName(ds);
  let projs=data.projects;
  if(!window.dayBlocks[ds]) window.dayBlocks[ds]={};

  // Timed Events
  let tes=timedEventsOn(ds);
  // 프로젝트별 일정 그룹
  let projEvs={};
  projs.forEach(p=>{ projEvs[p.id]=evs.filter(e=>e.projectId===p.id); });

  let html=`<div class="day-view" style="display:flex;flex-direction:column;gap:12px;">`;

  // ─ 상단: 일정 섹션 (프로젝트별 컬럼) ─
  html+=`<div class="card" style="overflow:hidden;">`;
  html+=`<div style="padding:10px 16px;font-weight:500;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">
    ${state.cursor.getMonth()+1}월 ${state.cursor.getDate()}일 일정
    ${dayHol?`<span style="color:var(--red);font-size:11px;font-weight:400;">· ${dayHol}</span>`:''}
    <button onclick="openAddModal('${ds}')" style="margin-left:auto;font-size:11px;padding:3px 10px;background:var(--accent);color:white;border:none;border-radius:12px;cursor:pointer;">+ 일정</button>
  </div>`;

  // 프로젝트별 컬럼 그리드
  let activeProjIds=projs.filter(p=>projEvs[p.id].length>0);
  // Timed Events 행 추가
  if(tes.length>0){
    html+=`<div style="padding:6px 12px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;">`;
    tes.forEach(te=>{
      let cat=timedCat(te.categoryId);let c=cat.color||'#4472C4';
      html+=`<div style="background:${evBg(c)};color:${evTxt(c)};border-radius:12px;padding:3px 10px;font-size:12px;cursor:pointer;display:flex;gap:4px;align-items:center;" onclick="openTimedEventModal('${te.id}')">
        <span style="font-weight:600;">${te.time}</span><span>${cat.emoji?cat.emoji+' ':''}</span><span>${te.title}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  if(activeProjIds.length===0){
    html+=`<div class="empty" style="padding:20px;">이 날 일정 없음</div>`;
  } else {
    html+=`<div style="display:grid;grid-template-columns:repeat(${Math.min(activeProjIds.length,4)},1fr);gap:0;border-top:1px solid var(--border);">`;
    activeProjIds.forEach(p=>{
      let c=p.color||'var(--accent)';
      html+=`<div style="border-right:1px solid var(--border);padding:8px 10px;min-height:60px;">
        <div style="font-size:10px;font-weight:600;color:${c};margin-bottom:6px;display:flex;align-items:center;gap:4px;">
          <span style="width:6px;height:6px;border-radius:50%;background:${c};display:inline-block;"></span>${p.name}
        </div>`;
      projEvs[p.id].forEach(ev=>{
        html+=`<div style="background:${evBg(c)};color:${evTxt(c)};border-radius:6px;padding:4px 7px;margin-bottom:4px;font-size:12px;cursor:pointer;" onclick="openEditModal('${ev.id}')">
          <div style="font-weight:500;">${ev.title}</div>
          <div style="font-size:10px;opacity:0.75;">${ev.start}</div>
        </div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;

  // ─ 중간: 시간 블록 섹션 ─
  html+=`<div class="card" style="overflow:hidden;">`;
  html+=`<div style="padding:10px 16px;font-weight:500;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">
    시간 블록
    <span style="font-size:11px;color:var(--text3);font-weight:400;">클릭해서 기록</span>
  </div>`;
  html+=`<div style="display:grid;grid-template-columns:44px repeat(${projs.length},1fr);border-bottom:1px solid var(--border);background:var(--surface2);">`;
  html+=`<div></div>`;
  projs.forEach(p=>{
    html+=`<div style="font-size:10px;font-weight:600;color:${p.color||'var(--accent)'};padding:5px 4px;text-align:center;border-left:1px solid var(--border);">${p.name}</div>`;
  });
  html+=`</div>`;

  // 시간별 행 (7시~다음날6시, 24시간)
  let blockHours=[];
  for(let h=7;h<=30;h++) blockHours.push(h%24);

  for(let hi=0;hi<blockHours.length;hi++){
    let h=blockHours[hi];
    let hs=String(h).padStart(2,'0')+':00';
    html+=`<div style="display:grid;grid-template-columns:44px repeat(${projs.length},1fr);border-bottom:1px solid var(--border);min-height:34px;">`;
    html+=`<div style="font-size:10px;color:var(--text3);padding:4px 4px 0;text-align:right;line-height:1;">${hs}</div>`;
    projs.forEach(p=>{
      let blockKey=`${h}_${p.id}`;
      let hasBlock=(blockKey in window.dayBlocks[ds]);
      let blockVal=hasBlock?window.dayBlocks[ds][blockKey]:'';
      let c=p.color||'var(--accent)';
      // 첫 번째 블록 셀에만 메모 입력 표시 (연속 블록 중 가장 위)
      let prevH=blockHours[hi-1];
      let prevKey=prevH!==undefined?`${prevH}_${p.id}`:null;
      let isFirst=hasBlock&&(!prevKey||(!(prevKey in window.dayBlocks[ds])));
      html+=`<div
        data-h="${h}" data-pid="${p.id}" data-ds="${ds}"
        style="border-left:1px solid var(--border);padding:2px 3px;cursor:crosshair;user-select:none;${hasBlock?`background:${evBg(c)};`:''}"
        onmousedown="startDayBlockDrag(event,'${ds}',${h},'${p.id}')"
        onmouseenter="continueDayBlockDrag(event,'${ds}',${h},'${p.id}')"
        onmouseup="endDayBlockDrag()"
        ontouchstart="startDayBlockDrag(event,'${ds}',${h},'${p.id}')"
        ontouchmove="touchMoveDayBlock(event)"
        ontouchend="endDayBlockDrag()">
        ${isFirst?`<input id="block-inp-${h}-${p.id}"
          type="text" value="${blockVal}"
          placeholder="메모..."
          style="width:100%;border:none;background:transparent;font-size:10px;color:${evTxt(c)};outline:none;font-family:inherit;pointer-events:auto;"
          onmousedown="event.stopPropagation()"
          onblur="saveDayBlockText('${ds}',${h},'${p.id}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()">`:''}
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;

  // ─ 하단: Tasks ─
  html+=`<div class="card" style="overflow:hidden;">`;
  html+=`<div style="padding:10px 16px;font-weight:500;font-size:13px;border-bottom:1px solid var(--border);">Tasks</div>`;
  let linkedTdIds=new Set();
  evs.forEach(ev=>{
    let subs=allTds.filter(t=>t.eventId===ev.id);
    if(subs.length===0) return;
    let c=evColor(ev);
    html+=`<div class="day-ev-group">
      <div class="day-ev-group-title" style="color:${c};" onclick="openEditModal('${ev.id}')">
        <span class="day-ev-dot" style="background:${c};"></span>${ev.title}
      </div>`;
    subs.forEach(td=>{
      linkedTdIds.add(td.id);
      html+=`<div class="todo-item day-sub-item">
        <input type="checkbox" class="todo-cb" ${td.done?'checked':''} onchange="doToggleTodo('${td.id}',this.checked)">
        <span class="todo-text${td.done?' done':''}">${td.title}</span>
        <button class="todo-del" onclick="doDeleteTodo('${td.id}')">✕</button>
      </div>`;
    });
    html+=`<div class="todo-sub-add day-sub-item" style="padding-left:28px;">
      <input class="todo-sub-input" type="text" placeholder="+ 세부 항목 추가..."
        onkeydown="if(event.key==='Enter')doAddLinkedTodo('${ev.id}',this)">
    </div></div>`;
  });
  let unlinked=allTds.filter(t=>!linkedTdIds.has(t.id));
  unlinked.forEach(td=>{
    let p=proj(td.projectId);
    html+=`<div class="todo-item">
      <input type="checkbox" class="todo-cb" ${td.done?'checked':''} onchange="doToggleTodo('${td.id}',this.checked)">
      <span class="todo-text${td.done?' done':''}"><span style="font-size:10px;padding:0 4px;border-radius:8px;background:${evBg(p.color)};color:${evTxt(p.color)};margin-right:4px;">${p.name}</span>${td.title}</span>
      <button class="todo-del" onclick="doDeleteTodo('${td.id}')">✕</button>
    </div>`;
  });
  if(allTds.length===0) html+=`<div class="empty">할 일 없음</div>`;
  html+=`<div class="quick-add"><input type="text" id="dv-todo-inp" placeholder="할 일 추가..." onkeydown="if(event.key==='Enter')addDayTodo('${ds}')"><button onclick="addDayTodo('${ds}')">+</button></div>`;
  html+=`</div>`;

  html+=`</div>`;
  document.getElementById('main-content').innerHTML=html;
}

// ── 시간블록 드래그 ───────────────────────────────────────
let _dragState = null; // {ds, pid, mode:'add'|'remove', startH}

function startDayBlockDrag(e, ds, h, pid){
  e.preventDefault();
  if(!window.dayBlocks[ds]) window.dayBlocks[ds]={};
  let key=`${h}_${pid}`;
  // 이미 블록 있으면 제거모드, 없으면 추가모드
  let mode=(key in window.dayBlocks[ds])?'remove':'add';
  _dragState={ds,pid,mode};
  if(mode==='add'){
    window.dayBlocks[ds][key]='';
  } else {
    delete window.dayBlocks[ds][key];
  }
  renderDay();
}
function continueDayBlockDrag(e, ds, h, pid){
  if(!_dragState||_dragState.pid!==pid||_dragState.ds!==ds) return;
  e.preventDefault();
  if(!window.dayBlocks[ds]) window.dayBlocks[ds]={};
  let key=`${h}_${pid}`;
  if(_dragState.mode==='add'){
    if(!(key in window.dayBlocks[ds])){
      window.dayBlocks[ds][key]='';
      renderDay();
    }
  } else {
    if(key in window.dayBlocks[ds]){
      delete window.dayBlocks[ds][key];
      renderDay();
    }
  }
}
function endDayBlockDrag(){
  _dragState=null;
}
function touchMoveDayBlock(e){
  if(!_dragState) return;
  e.preventDefault();
  let touch=e.touches[0];
  let el=document.elementFromPoint(touch.clientX,touch.clientY);
  if(!el) return;
  let cell=el.closest('[data-h][data-pid]');
  if(!cell) return;
  let h=parseInt(cell.dataset.h);
  let pid=cell.dataset.pid;
  let ds=cell.dataset.ds;
  continueDayBlockDrag(e,ds,h,pid);
}
// 마우스업 전역 등록
document.addEventListener('mouseup',()=>{ _dragState=null; });

function toggleDayBlock(ds,h,pid){
  if(!window.dayBlocks[ds]) window.dayBlocks[ds]={};
  let key=`${h}_${pid}`;
  if(window.dayBlocks[ds][key]!==undefined){
    // 이미 있으면 삭제
    delete window.dayBlocks[ds][key];
    renderDay();
  } else {
    // 없으면 빈 문자열로 켜고 인라인 입력 표시
    window.dayBlocks[ds][key]='';
    renderDay();
    // 입력창에 포커스
    setTimeout(()=>{
      let inp=document.getElementById(`block-inp-${h}-${pid}`);
      if(inp) inp.focus();
    },50);
  }
}
function saveDayBlockText(ds,h,pid,val){
  if(!window.dayBlocks[ds]) window.dayBlocks[ds]={};
  let key=`${h}_${pid}`;
  if(val.trim()===''){
    delete window.dayBlocks[ds][key];
  } else {
    window.dayBlocks[ds][key]=val.trim();
  }
  renderDay();
}

// ── Month view ─────────────────────────────────────────────
function renderMonth(){
  let yr=state.cursor.getFullYear(),mo=state.cursor.getMonth();
  let first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
  let todS=todayStr();
  let firstDow=first.getDay(),offset=firstDow===0?6:firstDow-1;
  let html=`<div class="card month-view" style="overflow:hidden;">`;
  html+=`<div class="month-header-row" style="border-bottom:1px solid var(--border);">`;
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach((d,i)=>{html+=`<div class="month-dow ${i===5?'sat':i===6?'sun':''}">${d}</div>`;});
  html+=`</div><div class="month-grid">`;
  let cells=[];
  for(let i=0;i<offset;i++){let d=new Date(yr,mo,1-offset+i);cells.push({date:d,other:true});}
  for(let i=1;i<=last.getDate();i++) cells.push({date:new Date(yr,mo,i),other:false});
  let rem=7-(cells.length%7);if(rem<7)for(let i=1;i<=rem;i++) cells.push({date:new Date(yr,mo+1,i),other:true});
  cells.forEach(cell=>{
    let ds=fmtDate(cell.date),isToday=ds===todS,isSel=ds===state.selected;
    let evs=eventsOn(ds),tds=todosOn(ds,true);
    let dow=cell.date.getDay(),dowIdx=dow===0?6:dow-1;
    let holiday=!cell.other?holidayName(ds):'';
    let annivs=!cell.other?getAnniversaries(ds):[];
    let numColor=holiday?'color:var(--red);':dowIdx===5?'color:var(--accent);':dowIdx===6?'color:var(--red);':'';
    let cellBg=(!cell.other&&data.cellColors&&data.cellColors[ds])?data.cellColors[ds]:'';
    let bgStyle=cellBg?`background:${cellBg}1A;`:'';
    html+=`<div class="month-cell${cell.other?' other':''}${isToday?' today':''}${isSel?' selected':''}" style="${bgStyle}" onclick="selectDay('${ds}');${!cell.other?`openAddModal('${ds}','09:00')`:''}">`;
    let labelsHtml='';
    if(!cell.other){
      if(holiday) labelsHtml+=`<span style="font-size:9px;color:var(--red);font-weight:500;margin-left:3px;">${holiday}</span>`;
      annivs.forEach(a=>{ labelsHtml+=`<span style="font-size:9px;color:var(--accent);font-weight:500;margin-left:3px;">${a.emoji?a.emoji+' ':''}${a.name}</span>`; });
    }
    html+=`<div class="month-cell-num" style="display:flex;align-items:baseline;flex-wrap:wrap;gap:1px;${numColor}${cellBg&&!cell.other?`color:${cellBg};font-weight:700;`:''}"><span>${cell.date.getDate()}</span>${cellBg&&!cell.other?`<span class="cell-color-dot" style="background:${cellBg};"></span>`:''}${labelsHtml}</div>`;
    // Timed Events - 시간+제목 표시
    timedEventsOn(ds).forEach(te=>{
      let cat=timedCat(te.categoryId);let c=cat.color||'#4472C4';
      html+=`<div class="month-ev" style="background:${evBg(c)};color:${evTxt(c)};display:flex;gap:3px;" onclick="event.stopPropagation();openTimedEventModal('${te.id}')"><span style="opacity:0.75;font-size:9px;">${te.time}</span>${te.title}</div>`;
    });
    evs.forEach(ev=>{
      let c=evColor(ev);
      html+=`<div class="month-ev" style="background:${evBg(c)};color:${evTxt(c)};" onclick="event.stopPropagation();openEditModal('${ev.id}')">${ev.title}</div>`;
    });
    tds.forEach(td=>{
      let p=proj(td.projectId);
      html+=`<div class="month-ev" style="background:${evBg(p.color)};color:${evTxt(p.color)};">${td.done?'✓':''} ${td.title}</div>`;
    });
    html+=`</div>`;
  });
  html+=`</div></div>`;
  document.getElementById('main-content').innerHTML=html;
}

// ── Year view ──────────────────────────────────────────────
function renderYear(){
  let yr=state.cursor.getFullYear(),todS=todayStr();
  let html=`<div class="year-view">`;
  for(let mo=0;mo<12;mo++){
    html+=`<div class="card" style="padding:12px;">`;
    html+=`<div style="font-size:12px;font-weight:500;margin-bottom:8px;padding:0 2px;">${MONTHS_KO[mo]}</div>`;
    html+=`<div class="year-mini-grid">`;
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{html+=`<div class="year-dow">${d}</div>`;});
    let first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
    let firstDow=first.getDay(),offset=firstDow===0?6:firstDow-1;
    for(let i=0;i<offset;i++) html+=`<div class="year-day other"></div>`;
    for(let d=1;d<=last.getDate();d++){
      let ds=ym(yr,mo,d),isT=ds===todS;
      let hasEv=data.events.some(e=>e.date===ds)||data.todos.some(t=>t.date===ds&&!t.eventId);
      let dow=new Date(yr,mo,d).getDay(),dowIdx=dow===0?6:dow-1;
      let isHol=isHoliday(ds);
      let cls='year-day'+(isT?' today':hasEv?' has-ev':'')+(isHol&&!isT?' sun':dowIdx===5&&!isT?' sat':dowIdx===6&&!isT?' sun':'');
      html+=`<div class="${cls}" onclick="jumpToDay('${ds}')">${d}</div>`;
    }
    html+=`</div></div>`;
  }
  html+=`</div>`;
  document.getElementById('main-content').innerHTML=html;
}




// ── Modal ──────────────────────────────────────────────────
function openAddModal(date, time){
  modalMode='add'; editingId=null; modalType='event'; selectedColor='';
  document.getElementById('modal-title').textContent='일정 추가';
  document.getElementById('m-title').value='';
  document.getElementById('m-date').value=date||state.selected||todayStr();
  document.getElementById('m-start').value=time||'09:00';
  document.getElementById('m-end').value=time?String(parseInt(time)+1).padStart(2,'0')+':00':'10:00';
  document.getElementById('m-note').value='';
  document.getElementById('m-del-btn').style.display='none';
  document.getElementById('m-subtasks-section').style.display='none';
  setModalType('event');
  let sel=document.getElementById('m-project');
  sel.innerHTML=data.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  renderColorSwatches();
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('m-title').focus(),100);
}

function openEditModal(id){
  let ev=data.events.find(e=>e.id===id);
  if(!ev) return;
  modalMode='edit'; editingId=id; modalType='event'; selectedColor=ev.color||'';
  document.getElementById('modal-title').textContent='일정 수정';
  document.getElementById('m-title').value=ev.title;
  document.getElementById('m-date').value=ev.date;
  document.getElementById('m-start').value=ev.start;
  document.getElementById('m-end').value=ev.end;
  document.getElementById('m-note').value=ev.note||'';
  document.getElementById('m-del-btn').style.display='';
  let sel=document.getElementById('m-project');
  sel.innerHTML=data.projects.map(p=>`<option value="${p.id}"${p.id===ev.projectId?' selected':''}>${p.name}</option>`).join('');
  renderColorSwatches();
  // Subtasks
  let subs=data.todos.filter(t=>t.eventId===id);
  document.getElementById('m-subtasks-section').style.display='';
  renderSubtasksList(subs);
  setModalType('event');
  document.getElementById('modal').style.display='flex';
}

function renderSubtasksList(subs){
  let html=subs.map(td=>`<div class="subtask-row">
    <input type="checkbox" class="todo-cb" ${td.done?'checked':''} onchange="doToggleTodo('${td.id}',this.checked)">
    <span class="todo-text${td.done?' subtask-done':''}" style="flex:1;">${td.title}</span>
    <button onclick="doDeleteTodo('${td.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;">✕</button>
  </div>`).join('');
  document.getElementById('m-subtasks-list').innerHTML=html||'<div style="font-size:12px;color:var(--text3);padding:4px 0;">세부 항목 없음</div>';
}

async function addSubtask(){
  if(!editingId) return;
  let inp=document.getElementById('m-subtask-input');
  let title=inp.value.trim();if(!title)return;
  let ev=data.events.find(e=>e.id===editingId);
  let td={id:'t'+Date.now(),title,date:ev?.date||todayStr(),projectId:ev?.projectId||data.projects[0]?.id||'',done:false,eventId:editingId};
  data.todos.push(td);
  inp.value='';
  renderSubtasksList(data.todos.filter(t=>t.eventId===editingId));
  renderAll();
  await saveTodo(td);
}

function setModalType(t){
  modalType=t;
  document.getElementById('type-ev-btn').className='tb-btn'+(t==='event'?' active':'');
  document.getElementById('type-td-btn').className='tb-btn'+(t==='todo'?' active':'');
  document.getElementById('m-time-section').style.display=t==='event'?'':'none';
  document.getElementById('m-color-row').style.display=t==='event'?'':'none';
}

function renderColorSwatches(){
  let html='';
  PALETTE.forEach(c=>{html+=`<div class="color-swatch${c===selectedColor?' selected':''}" style="background:${c};" onclick="pickColor('${c}')"></div>`;});
  document.getElementById('color-swatches').innerHTML=html;
}
function pickColor(c){selectedColor=c;renderColorSwatches();}
function closeModal(){document.getElementById('modal').style.display='none';}

async function saveItem(){
  let title=document.getElementById('m-title').value.trim();
  if(!title){document.getElementById('m-title').focus();return;}
  let date=document.getElementById('m-date').value;
  let pid=document.getElementById('m-project').value;
  if(modalType==='event'){
    let item={id:modalMode==='add'?'e'+Date.now():editingId,title,date,
      start:document.getElementById('m-start').value,
      end:document.getElementById('m-end').value,
      projectId:pid,color:selectedColor,
      note:document.getElementById('m-note').value};
    if(modalMode==='add') data.events.push(item);
    else{
      let idx=data.events.findIndex(e=>e.id===editingId);
      if(idx>=0) data.events[idx]=item;
      data.todos.forEach(t=>{if(t.eventId===editingId){t.date=date;saveTodo(t);}});
    }
    closeModal();renderAll();
    await saveEvent(item);
  } else {
    let td={id:'t'+Date.now(),title,date,projectId:pid,done:false,eventId:''};
    data.todos.push(td);
    closeModal();renderAll();
    await saveTodo(td);
  }
}

async function deleteItem(){
  if(!editingId) return;
  data.todos=data.todos.filter(t=>t.eventId!==editingId);
  data.events=data.events.filter(e=>e.id!==editingId);
  closeModal();renderAll();
  await deleteEvent(editingId);
}

// ── Todos Panel ────────────────────────────────────────────
function toggleHideDone(){
  hideDone=!hideDone;
  let btn=document.getElementById('hide-done-btn');
  if(btn){btn.textContent=hideDone?'완료 보기':'완료 숨기기';btn.style.background=hideDone?'var(--surface2)':'none';btn.style.fontWeight=hideDone?'600':'';}
  renderTodosPanel();
}
function toggleTodos(){renderTodosPanel();let btn=document.getElementById('hide-done-btn');if(btn){btn.textContent=hideDone?'완료 보기':'완료 숨기기';btn.style.background=hideDone?'var(--surface2)':'none';btn.style.fontWeight=hideDone?'600':'';}document.getElementById('todo-panel').style.display='flex';}
function closeTodoPanelDirect(){document.getElementById('todo-panel').style.display='none';}
function setTodoView(mode){todoViewMode=mode;document.querySelectorAll('.todo-view-btn').forEach(b=>b.classList.remove('active'));document.getElementById('tvb-'+mode)?.classList.add('active');renderTodosPanel();}

function renderTodosPanel(){
  let pfEl=document.getElementById('todo-proj-filter');
  if(todoViewMode==='event'){pfEl.innerHTML='';}
  else{
    let fh=`<button onclick="setTodoProjFilter(null)" class="todo-filter-btn${todoProjFilter===null?' active':''}">전체</button>`;
    data.projects.forEach(p=>{fh+=`<button onclick="setTodoProjFilter('${p.id}')" class="todo-filter-btn${todoProjFilter===p.id?' active':''}" style="${todoProjFilter===p.id?`background:${p.color};color:white;border-color:${p.color};`:''}"> ${p.name}</button>`;});
    pfEl.innerHTML=fh;
  }
  let html='';
  if(todoViewMode==='event') html=renderTodosByEvent();
  else if(todoViewMode==='date') html=renderTodosByDate();
  else html=renderTodosByProj();
  document.getElementById('todo-list-content').innerHTML=html||'<div class="empty">할 일이 없습니다</div>';
}

function renderTodosByEvent(){
  let html='';
  let linked=data.todos.filter(t=>t.eventId);
  let eventIds=[...new Set(linked.map(t=>t.eventId))];
  eventIds.sort((a,b)=>{let ea=data.events.find(e=>e.id===a),eb=data.events.find(e=>e.id===b);return(ea?.date||'').localeCompare(eb?.date||'');});
  eventIds.forEach(eid=>{
    let ev=data.events.find(e=>e.id===eid);
    let allSubs=linked.filter(t=>t.eventId===eid);
    let done=allSubs.filter(t=>t.done).length;
    let subs=allSubs.filter(t=>hideDone?!t.done:true).sort((a,b)=>a.done===b.done?0:a.done?1:-1);
    let c=ev?evColor(ev):'#A8A59E';
    html+=`<div class="todo-ev-group">
      <div class="todo-ev-header" onclick="toggleTodoGroup('tev-${eid}')">
        <div style="display:flex;align-items:center;gap:7px;flex:1;min-width:0;">
          <span style="width:9px;height:9px;border-radius:50%;background:${c};flex-shrink:0;"></span>
          <span class="todo-group-title">${ev?ev.title:'삭제된 일정'}</span>
          ${ev?`<span style="font-size:10px;color:var(--text3);flex-shrink:0;">${ev.date}</span>`:''}
        </div>
        <span class="todo-group-count">${done}/${allSubs.length}</span>
      </div>
      <div class="todo-ev-body" id="tev-${eid}">`;
    subs.forEach(td=>{
      html+=`<div class="todo-item todo-sub-row">
        <span class="todo-sub-indent"></span>
        <input type="checkbox" class="todo-cb" ${td.done?'checked':''} onchange="doToggleTodo('${td.id}',this.checked)">
        <span class="todo-text${td.done?' done':''}">${td.title}</span>
        <button class="todo-del" onclick="doDeleteTodo('${td.id}')">✕</button>
      </div>`;
    });
    html+=`<div class="todo-sub-add-row">
        <span class="todo-sub-indent"></span>
        <input class="todo-sub-input" type="text" placeholder="+ 세부 항목 추가..."
          onkeydown="if(event.key==='Enter')doAddLinkedTodo('${eid}',this)">
      </div></div></div>`;
  });
  let unlinked=data.todos.filter(t=>!t.eventId).filter(t=>hideDone?!t.done:true).sort((a,b)=>a.done===b.done?0:a.done?1:-1);
  if(unlinked.length>0){
    html+=`<div class="todo-ev-group">
      <div class="todo-ev-header" onclick="toggleTodoGroup('tev-unlinked')">
        <div style="display:flex;align-items:center;gap:7px;">
          <span style="width:9px;height:9px;border-radius:50%;background:var(--text3);flex-shrink:0;"></span>
          <span class="todo-group-title">기타 할 일</span>
        </div>
        <span class="todo-group-count">${unlinked.filter(t=>t.done).length}/${unlinked.length}</span>
      </div>
      <div class="todo-ev-body" id="tev-unlinked">`;
    unlinked.forEach(td=>{
      let p=proj(td.projectId);
      html+=`<div class="todo-item">
        <input type="checkbox" class="todo-cb" ${td.done?'checked':''} onchange="doToggleTodo('${td.id}',this.checked)">
        <span class="todo-text${td.done?' done':''}">
          <span class="todo-proj-badge" style="background:${evBg(p.color)};color:${evTxt(p.color)};">${p.name}</span>
          ${td.title}
          <span style="font-size:10px;color:var(--text3);margin-left:4px;">${td.date||''}</span>
        </span>
        <button class="todo-del" onclick="doDeleteTodo('${td.id}')">✕</button>
      </div>`;
    });
    html+=`</div></div>`;
  }
  return html||'<div class="empty">할 일이 없습니다</div>';
}

function renderTodosByDate(){
  let all=data.todos.filter(t=>todoProjFilter===null||t.projectId===todoProjFilter).filter(t=>hideDone?!t.done:true);
  let byDate={};
  all.forEach(t=>{let d=t.date||'날짜 없음';if(!byDate[d])byDate[d]=[];byDate[d].push(t);});
  let dates=Object.keys(byDate).sort();
  let html='';
  dates.forEach(d=>{
    let todos=byDate[d];
    let done=todos.filter(t=>t.done).length;
    html+=`<div class="todo-group">
      <div class="todo-group-header" onclick="toggleTodoGroup('td-${d}')">
        <span class="todo-group-title">${d}</span>
        <span class="todo-group-count">${done}/${todos.length}</span>
      </div>
      <div class="todo-group-body" id="td-${d}">`;
    todos.sort((a,b)=>a.done===b.done?0:a.done?1:-1).forEach(td=>{html+=todoItemHtml(td);});
    html+=`</div></div>`;
  });
  return html;
}

function renderTodosByProj(){
  let all=data.todos.filter(t=>todoProjFilter===null||t.projectId===todoProjFilter).filter(t=>hideDone?!t.done:true);
  let byProj={};
  all.forEach(t=>{if(!byProj[t.projectId])byProj[t.projectId]=[];byProj[t.projectId].push(t);});
  let html='';
  data.projects.forEach(p=>{
    if(!byProj[p.id]) return;
    let todos=byProj[p.id];
    let done=todos.filter(t=>t.done).length;
    html+=`<div class="todo-group">
      <div class="todo-group-header" onclick="toggleTodoGroup('tp-${p.id}')">
        <div style="display:flex;align-items:center;gap:7px;">
          <span style="width:8px;height:8px;border-radius:50%;background:${p.color};"></span>
          <span class="todo-group-title">${p.name}</span>
        </div>
        <span class="todo-group-count">${done}/${todos.length}</span>
      </div>
      <div class="todo-group-body" id="tp-${p.id}">`;
    todos.sort((a,b)=>a.done===b.done?0:a.done?1:-1).forEach(td=>{html+=todoItemHtml(td);});
    html+=`</div></div>`;
  });
  return html;
}

function todoItemHtml(td){
  let p=proj(td.projectId);
  let isLinked=!!td.eventId;
  let evTitle=isLinked?(data.events.find(e=>e.id===td.eventId)?.title||'삭제된 일정'):'';
  let indent=isLinked?`<span class="todo-sub-indent"></span>`:'';
  let badge=!isLinked
    ?`<span class="todo-proj-badge" style="background:${evBg(p.color)};color:${evTxt(p.color)};">${p.name}</span>`
    :`<span class="todo-proj-badge" style="background:var(--surface2);color:var(--text3);font-size:9px;">↳ ${evTitle}</span>`;
  return `<div class="todo-item${isLinked?' todo-sub-row':''}" id="tdi-${td.id}">
    ${indent}
    <input type="checkbox" class="todo-cb" ${td.done?'checked':''} onchange="doToggleTodo('${td.id}',this.checked)">
    <span class="todo-text${td.done?' done':''}">
      ${badge}${td.title}
      <span style="font-size:10px;color:var(--text3);margin-left:4px;">${td.date||''}</span>
    </span>
    <button class="todo-del" onclick="doDeleteTodo('${td.id}')">✕</button>
  </div>`;
}

function toggleTodoGroup(id){let el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'':' none';}

async function doAddLinkedTodo(eventId, input){
  let title=input.value.trim();if(!title)return;
  let ev=data.events.find(e=>e.id===eventId);

function exportData(){
  // 통일된 형식으로 내보내기
  let exportObj={
    projects: data.projects,
    events: data.events,
    todos: data.todos,
    golf: data.golf,
    office: data.office,
    cellColors: data.cellColors,
    anniversaries: data.anniversaries,
    exportedAt: new Date().toISOString()
  };
  let fn='내스케줄_백업_'+new Date().toISOString().slice(0,10)+'.json';
  let blob=new Blob([JSON.stringify(exportObj,null,2)],{type:'application/json'});
  let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click();URL.revokeObjectURL(a.href);
  showStatus('백업 완료');
}
async function importData(e){
  let file=e.target.files[0];if(!file)return;
  let reader=new FileReader();
  reader.onload=async function(ev){
    try{
      let imported=JSON.parse(ev.target.result);
      // 형식 검사
      if(!imported.events||!imported.todos||!imported.projects) throw new Error('올바른 백업 파일이 아닙니다.');
      if(!confirm(`백업 파일 복원\n\n• 프로젝트 ${imported.projects.length}개\n• 일정 ${imported.events.length}개\n• 할 일 ${imported.todos.length}개\n\n현재 데이터를 모두 대체합니다. 계속하시겠습니까?`)) return;
      setSyncing();
      let uid=currentUser.id;
      // 기존 데이터 전체 삭제 (projects 포함)
      const delResults = await Promise.all([
        sb.from('projects').delete().eq('user_id',uid),
        sb.from('events').delete().eq('user_id',uid),
        sb.from('todos').delete().eq('user_id',uid),
        sb.from('golf').delete().eq('user_id',uid),
        sb.from('office').delete().eq('user_id',uid),
        sb.from('cell_colors').delete().eq('user_id',uid),
      ]);
      const delError = delResults.find(r=>r.error);
      if(delError) throw new Error('삭제 실패: '+delError.error.message);
      // 새 데이터 업로드
      for(const p of (imported.projects||[])) await saveProject(p);
      for(const ev of (imported.events||[])) await saveEvent(ev);
      for(const td of (imported.todos||[])) await saveTodo(td);
      for(const [ds,rounds] of Object.entries(imported.golf||{})) await saveGolfRecord(ds,rounds);
      for(const [ds,rec] of Object.entries(imported.office||{})) await saveOfficeRecord(ds,rec);
      for(const [ds,color] of Object.entries(imported.cellColors||{})) await saveCellColor(ds,color);
      // 기념일 복원
      if(imported.anniversaries && imported.anniversaries.length > 0) {
        await sb.from('anniversaries').delete().eq('user_id', currentUser.id);
        let annRows = imported.anniversaries.map(a=>({
          id:a.id, user_id:currentUser.id, name:a.name, emoji:a.emoji,
          month:a.month, day:a.day, year:a.year||null, repeat_yearly:a.repeatYearly
        }));
        await sb.from('anniversaries').insert(annRows);
      }
      // 서버 기준으로 재동기화
      await loadAllData();
      showStatus('복원 완료 ✓');
    }catch(err){setSyncError('복원 실패');alert(err.message||'복원 중 오류가 발생했습니다.');}
    e.target.value='';
  };
  reader.readAsText(file);
}

    <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:12px;color:var(--text2);">근무 시간</span><span style="font-size:12px;font-weight:600;color:${hrDone?'var(--green)':'var(--text)'};">${offHours.toFixed(1)} / 100h ${hrDone?'✓':''}</span></div>
    <div class="work-bar-bg"><div class="work-bar-fill" style="width:${hrPct}%;background:${hrDone?'var(--green)':'#0891B2'};"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:12px;margin-bottom:5px;"><span style="font-size:12px;color:var(--text2);">출근 일수</span><span style="font-size:12px;font-weight:600;color:${dayDone?'var(--green)':'var(--text)'};">${offDays} / 10일 ${dayDone?'✓':''}</span></div>
    <div class="work-bar-bg"><div class="work-bar-fill" style="width:${dayPct}%;background:${dayDone?'var(--green)':'#0891B2'};"></div></div>
    <div style="margin-top:14px;padding:10px;background:${hrDone&&dayDone?'var(--green-bg)':'var(--surface2)'};border-radius:var(--radius-sm);text-align:center;font-size:12px;font-weight:600;color:${hrDone&&dayDone?'var(--green-text)':'var(--text3)'};">
      ${hrDone&&dayDone?'✓ 이달 조건 달성!':'조건 미충족'+(missing?' ('+missing+' 부족)':'')}
    </div>
  </div></div></div>`;
  document.getElementById('main-content').innerHTML=html;
}

async function doClearOffice(ds){
  delete data.office[ds];
  renderStudio();
  await saveOfficeRecord(ds, null);
}

async function doSaveOffice(ds,field,val){
  if(!data.office[ds]) data.office[ds]={};
  if(val) data.office[ds][field]=val;
  else delete data.office[ds][field];
  let rec=data.office[ds];
  if(rec&&rec.in&&rec.out){
    let mins=timeDiff(rec.in,rec.out);
    if(mins>600){
      let [ih,im]=rec.in.split(':').map(Number);
      let capMins=ih*60+im+600;
      rec.out=String(Math.floor(capMins/60)).padStart(2,'0')+':'+String(capMins%60).padStart(2,'0');
      alert('하루 최대 10시간까지만 인정됩니다. 퇴근 시간이 자동 조정됐어요.');
    }
  }
  if(rec&&!rec.in&&!rec.out) delete data.office[ds];
  renderStudio();
  await saveOfficeRecord(ds, data.office[ds]||null);
}

// ── Cell Color Picker ──────────────────────────────────────
const CELL_COLORS=['#E53935','#FB8C00','#FDD835','#43A047','#00ACC1','#1E88E5','#8E24AA','#D81B60','#6D4C41','#546E7A'];
function openCellColorPicker(ds,evt){
  let existing=data.cellColors[ds]||'';
  let html=`<div class="cell-color-picker" id="cell-color-picker" onclick="event.stopPropagation()">
    <div style="font-size:11px;color:var(--text2);margin-bottom:7px;font-weight:600;">칸 색상</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">
      ${CELL_COLORS.map(c=>`<div class="cell-color-swatch${existing===c?' active':''}" style="background:${c};" onclick="doSetCellColor('${ds}','${c}')"></div>`).join('')}
    </div>
    <button onclick="doSetCellColor('${ds}','')" style="font-size:11px;background:none;border:1px solid var(--border2);border-radius:4px;padding:3px 8px;cursor:pointer;color:var(--text2);width:100%;">색상 제거</button>
  </div>`;
  document.getElementById('cell-color-picker')?.remove();
  document.body.insertAdjacentHTML('beforeend',html);
  let picker=document.getElementById('cell-color-picker');
  let rect=evt.target.closest('.month-cell').getBoundingClientRect();
  picker.style.left=Math.min(rect.left,window.innerWidth-160)+'px';
  picker.style.top=(rect.bottom+4)+'px';
  setTimeout(()=>document.addEventListener('click',closeCellColorPicker,{once:true}),0);
}
async function doSetCellColor(ds,color){
  if(!data.cellColors) data.cellColors={};
  if(color) data.cellColors[ds]=color; else delete data.cellColors[ds];
  document.getElementById('cell-color-picker')?.remove();
  renderMonth();
  await saveCellColor(ds,color);
}
function closeCellColorPicker(){document.getElementById('cell-color-picker')?.remove();}

async function showApp(user) {
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';
  setupHistoryGuard();
  document.getElementById('sync-status').style.display = 'flex';
  updateUserUI(currentUser);
  await loadAllData();
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('sync-status').style.display = 'none';
}

sb.auth.onAuthStateChange(async (event, session) => {
  console.log('AUTH EVENT:', event, session?.user?.email);
  if (session?.user) {
    if (!currentUser) await showApp(session.user);
  } else {
    currentUser = null;
    showLogin();
  }
});

// Check for existing session on load
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  console.log('INIT SESSION:', session?.user?.email);
  if (session?.user) {
    await showApp(session.user);
  } else {

  }
})();

// ── Android 뒤로가기 처리 ─────────────────────────────────
function setupHistoryGuard(){
  // 앱 진입 시 히스토리 스택에 더미 상태 추가
  history.pushState({app:true}, '', window.location.href);
}
window.addEventListener('popstate', function(e){
  // 열린 모달이 있으면 닫기
  let modals = [
    {id:'modal', fn:()=>document.getElementById('modal').style.display='none'},
    {id:'golf-modal', fn:closeGolfModal},
    {id:'anniv-modal', fn:closeAnnivModal},
    {id:'proj-modal', fn:()=>document.getElementById('proj-modal').style.display='none'},
    {id:'todo-panel', fn:()=>document.getElementById('todo-panel').style.display='none'},
  ];
  let closed = false;
  for(let m of modals){
    let el = document.getElementById(m.id);
    if(el && el.style.display !== 'none'){
      m.fn();
      closed = true;
      break;
    }
  }
  // 모달 닫았으면 히스토리 다시 쌓기 (다음 뒤로가기도 처리)
  history.pushState({app:true}, '', window.location.href);
  // 모달도 없으면 뷰를 month로 (day→month)
  if(!closed && state.view==='day'){
    setView('month');
  }
});

// ── Mouse wheel & touch swipe navigation ──────────────────
let _touchStartX=0,_touchStartY=0;
document.addEventListener('wheel',function(e){
  if(e.target.closest('.modal-overlay,.sidebar,.golf-amt-field,.work-time-input,input,textarea,select')) return;
  clearTimeout(window._wheelTimer);
  window._wheelTimer=setTimeout(()=>{navigate(e.deltaY>0?1:-1);},80);
},{passive:true});
document.addEventListener('touchstart',function(e){
  if(e.target.closest('.modal-overlay,.sidebar,input,textarea,select')) return;
  _touchStartX=e.touches[0].clientX;_touchStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  if(e.target.closest('.modal-overlay,.sidebar,input,textarea,select')) return;
  let dx=e.changedTouches[0].clientX-_touchStartX;
  let dy=e.changedTouches[0].clientY-_touchStartY;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){navigate(dx<0?1:-1);}
},{passive:true});
</script>
